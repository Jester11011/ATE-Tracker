function SeasonalRolloverModal({ goals, factions, allGoals, onConfirm, onCancel }) {
  const [step, setStep] = useState('resolve'); // 'resolve' | 'next-season'

  const [resolutions, setResolutions] = useState(() => {
    const init = {};
    for (const g of goals) init[g.id] = 'carried';
    return init;
  });

  // Per-faction setup for next season: { factionId: { title, description } }
  const [newGoals, setNewGoals] = useState({});
  // Suggestion picker state per faction
  const [pickerOpen, setPickerOpen] = useState({});

  const setResolution = (gid, res) => {
    setResolutions(prev => ({ ...prev, [gid]: res }));
  };

  const counts = {
    succeeded: Object.values(resolutions).filter(r => r === 'succeeded').length,
    carried: Object.values(resolutions).filter(r => r === 'carried').length,
    failed: Object.values(resolutions).filter(r => r === 'failed').length
  };

  // Factions that need a new seasonal goal next season:
  // - Factions whose current seasonal goal is being resolved (succeeded/failed)
  // - Factions that currently have no seasonal goal at all
  const factionsNeedingNewGoal = (() => {
    const out = [];
    for (const f of sortFactions(factions)) {
      const current = goals.find(g => g.factionId === f.id);
      if (!current) {
        // No active seasonal goal at all
        out.push(f);
      } else if (resolutions[current.id] === 'succeeded' || resolutions[current.id] === 'failed') {
        // Their goal got resolved — they're free for a new one
        out.push(f);
      }
    }
    return out;
  })();

  const updateNewGoal = (factionId, patch) => {
    setNewGoals(prev => ({ ...prev, [factionId]: { ...(prev[factionId] || {}), ...patch } }));
  };

  const applySuggestion = (factionId, seed) => {
    updateNewGoal(factionId, { title: seed.title, description: seed.description });
    setPickerOpen(prev => ({ ...prev, [factionId]: false }));
  };

  const handleConfirm = () => {
    // Pass both resolutions and any newly-seeded goals
    const seeded = [];
    for (const [factionId, data] of Object.entries(newGoals)) {
      if (data && data.title && data.title.trim()) {
        seeded.push({
          factionId,
          title: data.title.trim(),
          description: (data.description || '').trim(),
          term: 'seasonal',
          progress: 0,
          status: 'active',
          conflictsWith: [],
          alliedWith: [],
          progressLog: []
        });
      }
    }
    onConfirm(resolutions, seeded);
  };

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', zIndex: 50, overflowY: 'auto' }} className="flex items-start justify-center p-4 py-8">
      <div style={{ background: 'var(--bg-card)', border: '1px solid var(--accent)', maxWidth: '720px', width: '100%', padding: '20px' }}>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: '20px', color: 'var(--accent)', marginBottom: '4px' }}>
          Seasonal Rollover
        </div>
        <div style={{ fontSize: '11px', color: 'var(--ink-dim)', letterSpacing: '0.15em', marginBottom: '12px', textTransform: 'uppercase' }}>
          Step {step === 'resolve' ? '1' : '2'} of 2 — {step === 'resolve' ? 'Resolve current goals' : 'Set up next season'}
        </div>

        {step === 'resolve' && (
          <>
            <div style={{ fontSize: '12px', color: 'var(--ink-dim)', marginBottom: '16px', lineHeight: 1.5 }}>
              Decide what happens to each active seasonal goal. Succeeded goals bump their linked long-term goal +10. Carried goals stay alive at current progress. Failed goals are removed.
            </div>

            {goals.length === 0 ? (
              <div style={{ fontSize: '13px', color: 'var(--ink-faint)', textAlign: 'center', padding: '24px 0' }}>
                No active seasonal goals to roll over.
              </div>
            ) : (
              <>
                <div className="flex gap-3 flex-wrap mb-3" style={{ fontSize: '11px', letterSpacing: '0.1em', textTransform: 'uppercase' }}>
                  <span style={{ color: 'var(--good)' }}>Succeeded: {counts.succeeded}</span>
                  <span style={{ color: 'var(--ink-dim)' }}>Carried: {counts.carried}</span>
                  <span style={{ color: 'var(--danger)' }}>Failed: {counts.failed}</span>
                </div>

                <div className="space-y-3">
                  {goals.map(g => {
                    const f = factionById(factions, g.factionId);
                    const advancesGoal = g.advancesGoalId ? allGoals.find(x => x.id === g.advancesGoalId) : null;
                    const res = resolutions[g.id];
                    return (
                      <div key={g.id} style={{ background: 'var(--bg-card-2)', border: '1px solid var(--border)', padding: '10px 12px' }}>
                        <div className="flex items-start justify-between gap-3 flex-wrap mb-2">
                          <div className="flex-1 min-w-0">
                            <div style={{ fontSize: '13px', color: 'var(--ink)' }}>
                              <span style={{ color: 'var(--accent)' }}>{f?.name || '?'}:</span> {g.title}
                            </div>
                            <div style={{ fontSize: '10px', color: 'var(--ink-faint)', marginTop: '2px' }}>
                              Progress: {g.progress}/100
                              {advancesGoal && <span> · advances {advancesGoal.title}</span>}
                              {g.usedShortcut && <span style={{ color: 'var(--danger)' }}> · shortcut</span>}
                            </div>
                          </div>
                        </div>
                        <div className="flex gap-1">
                          {[
                            { id: 'succeeded', label: 'Succeeded', color: 'var(--good)' },
                            { id: 'carried', label: 'Carry over', color: 'var(--ink-dim)' },
                            { id: 'failed', label: 'Failed', color: 'var(--danger)' }
                          ].map(opt => (
                            <button
                              key={opt.id}
                              onClick={() => setResolution(g.id, opt.id)}
                              style={{
                                flex: 1, padding: '6px 0',
                                background: res === opt.id ? opt.color : 'transparent',
                                border: '1px solid ' + (res === opt.id ? opt.color : 'var(--border)'),
                                color: res === opt.id ? 'var(--bg)' : opt.color,
                                fontFamily: 'var(--font-mono)', fontSize: '11px',
                                letterSpacing: '0.1em', textTransform: 'uppercase', cursor: 'pointer',
                                fontWeight: res === opt.id ? 700 : 400
                              }}
                            >
                              {opt.label}
                            </button>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}

            <div className="flex justify-end gap-2 mt-5">
              <SmallBtn variant="dim" onClick={onCancel}>Cancel</SmallBtn>
              <SmallBtn variant="accent" onClick={() => setStep('next-season')}>
                Next: Set up new goals →
              </SmallBtn>
            </div>
          </>
        )}

        {step === 'next-season' && (
          <>
            <div style={{ fontSize: '12px', color: 'var(--ink-dim)', marginBottom: '16px', lineHeight: 1.5 }}>
              Optionally seed a new seasonal goal for any faction without one. Skip any faction you want to leave open — you can always add goals manually later.
            </div>

            {factionsNeedingNewGoal.length === 0 ? (
              <div style={{ fontSize: '13px', color: 'var(--ink-faint)', textAlign: 'center', padding: '24px 0' }}>
                Every faction already has a seasonal goal carried over. Nothing to set up.
              </div>
            ) : (
              <div className="space-y-4">
                {factionsNeedingNewGoal.map(f => {
                  const data = newGoals[f.id] || {};
                  const isOpen = pickerOpen[f.id];
                  return (
                    <div key={f.id} style={{ background: 'var(--bg-card-2)', border: '1px solid var(--border)', padding: '10px 12px' }}>
                      <div className="flex items-center justify-between gap-2 mb-2">
                        <div style={{ fontSize: '13px', color: 'var(--ink)' }}>
                          <span style={{ color: 'var(--accent)' }}>{f.name}</span>
                        </div>
                        <SmallBtn variant="dim" onClick={() => setPickerOpen(prev => ({ ...prev, [f.id]: !isOpen }))}>
                          {isOpen ? 'Hide' : '✨ Suggest'}
                        </SmallBtn>
                      </div>

                      {isOpen && (
                        <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', padding: '6px 8px', marginBottom: '6px', maxHeight: '180px', overflowY: 'auto' }}>
                          <div className="space-y-1">
                            {SEASONAL_GOAL_SEEDS.map((s, i) => (
                              <button
                                key={i}
                                onClick={() => applySuggestion(f.id, s)}
                                style={{
                                  width: '100%', textAlign: 'left',
                                  background: 'transparent', border: '1px solid var(--border)',
                                  padding: '6px 8px', cursor: 'pointer'
                                }}
                                onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--accent)'}
                                onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border)'}
                              >
                                <span style={{ fontSize: '11px', color: 'var(--ink)', fontWeight: 700 }}>{s.title}</span>
                                {s.questionable && <span style={{ fontSize: '9px', color: 'var(--danger)', marginLeft: '4px' }}>· questionable</span>}
                                <div style={{ fontSize: '10px', color: 'var(--ink-dim)', marginTop: '2px' }}>{s.description}</div>
                              </button>
                            ))}
                          </div>
                        </div>
                      )}

                      <input
                        value={data.title || ''}
                        onChange={e => updateNewGoal(f.id, { title: e.target.value })}
                        placeholder="Goal title (leave empty to skip)"
                        style={{ width: '100%', fontSize: '12px', marginBottom: '4px' }}
                      />
                      <textarea
                        value={data.description || ''}
                        onChange={e => updateNewGoal(f.id, { description: e.target.value })}
                        placeholder="Description (optional)"
                        rows={2}
                        style={{ width: '100%', fontSize: '11px' }}
                      />
                    </div>
                  );
                })}
              </div>
            )}

            <div className="flex justify-between gap-2 mt-5">
              <SmallBtn variant="dim" onClick={() => setStep('resolve')}>← Back</SmallBtn>
              <div className="flex gap-2">
                <SmallBtn variant="dim" onClick={onCancel}>Cancel</SmallBtn>
                <SmallBtn variant="accent" onClick={handleConfirm}>Apply Rollover</SmallBtn>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// === PLAYERS TAB ===

const MADNESS_TYPES = [
  '— None —',
  'Fix the Broken',
  "Gambler's Curse",
  'In the Spotlight',
  'Make It Hurt',
  'Pack First',
  'Sweet Rot',
  'The Other',
  'The Voice',
  'Tongue of the Serpent'
];

function PlayersTab({ players, onAdd, onUpdate, onDelete }) {
  const [adding, setAdding] = useState(false);
  const [newName, setNewName] = useState('');

  const handleAdd = () => {
    if (!newName.trim()) return;
    onAdd({ name: newName.trim() });
    setNewName('');
    setAdding(false);
  };

  return (
    <div className="py-6 space-y-4">
      <div className="flex items-center justify-between">
        <SectionHeader>Players ({players.length})</SectionHeader>
        {!adding && <SmallBtn variant="accent" onClick={() => setAdding(true)}>+ Add Player</SmallBtn>}
      </div>

      {adding && (
        <div style={{ background: 'var(--bg-card)', border: '1px dashed var(--accent)', padding: '14px' }} className="space-y-2">
          <Field label="Player name">
            <input
              className="w-full"
              value={newName}
              onChange={e => setNewName(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') handleAdd(); if (e.key === 'Escape') { setAdding(false); setNewName(''); } }}
              placeholder="e.g. Grady, Nesta..."
              autoFocus
            />
          </Field>
          <div className="flex justify-end gap-2">
            <SmallBtn variant="dim" onClick={() => { setAdding(false); setNewName(''); }}>Cancel</SmallBtn>
            <SmallBtn variant="accent" onClick={handleAdd}>Add</SmallBtn>
          </div>
        </div>
      )}

      {players.length === 0 && !adding && (
        <div className="py-12 text-center" style={{ color: 'var(--ink-faint)', fontSize: '13px' }}>
          No players yet. Add one above to start tracking.
        </div>
      )}

      <div className="space-y-3">
        {[...players].sort((a, b) => {
          const an = (a.name || '').trim();
          const bn = (b.name || '').trim();
          if (!an && !bn) return 0;
          if (!an) return 1;  // unnamed sorts to bottom
          if (!bn) return -1;
          return an.localeCompare(bn);
        }).map(p => (
          <PlayerCard key={p.id} player={p} onUpdate={onUpdate} onDelete={onDelete} />
        ))}
      </div>
    </div>
  );
}

function PlayerCard({ player, onUpdate, onDelete }) {
  const [expanded, setExpanded] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [equipDraft, setEquipDraft] = useState('');

  const equip = Array.isArray(player.equipment) ? player.equipment : [];
  const checks = Array.isArray(player.difficultyChecks) ? player.difficultyChecks : [false, false, false, false, false, false, false];

  const addEquip = () => {
    const t = equipDraft.trim();
    if (!t) return;
    onUpdate(player.id, { equipment: [...equip, t] });
    setEquipDraft('');
  };

  const updateEquip = (idx, text) => {
    const next = [...equip];
    next[idx] = text;
    onUpdate(player.id, { equipment: next });
  };

  const removeEquip = (idx) => {
    onUpdate(player.id, { equipment: equip.filter((_, i) => i !== idx) });
  };

  const toggleCheck = (idx) => {
    const next = [...checks];
    next[idx] = !next[idx];
    onUpdate(player.id, { difficultyChecks: next });
  };

  const adjustHP = (n) => {
    onUpdate(player.id, { hp: (player.hp || 0) + n });
  };

  const setMadnessLevel = (n) => {
    onUpdate(player.id, { madnessLevel: Math.max(1, Math.min(10, n)) });
  };

  const setWillpower = (n) => {
    onUpdate(player.id, { willpower: Math.max(0, Math.min(10, n)) });
  };

  const madnessLevel = player.madnessLevel || 1;
  const madnessColor = madnessLevel >= 9 ? 'var(--danger)' : madnessLevel >= 6 ? 'var(--accent)' : madnessLevel >= 3 ? 'var(--ink)' : 'var(--ink-dim)';

  const difficultyLabels = ['Very Easy', 'Easy', 'Medium', 'Hard', 'Very Hard', 'Exc. Hard', 'Almost Imp.'];
  const difficultyValues = ['3+', '5+', '15+', '30+', '35+', '45+', '50+'];

  return (
    <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', padding: '12px 14px' }}>
      {/* Collapsed row — unchanged */}
      <div className="flex items-center gap-3">
        <div className="flex-1 min-w-0">
          <div className="flex items-baseline gap-3 flex-wrap">
            <span style={{ fontFamily: 'var(--font-display)', fontSize: '17px', color: 'var(--ink)' }}>
              {player.name || 'Unnamed'}
            </span>
            {player.madnessType && player.madnessType !== '— None —' && (
              <span style={{ fontSize: '11px', color: madnessColor, letterSpacing: '0.1em' }}>
                {player.madnessType} · M{madnessLevel}
              </span>
            )}
          </div>
          <div style={{ fontSize: '11px', color: 'var(--ink-dim)', marginTop: '2px' }}>
            HP {player.hp ?? '—'} · WP {player.willpower ?? '—'} · {equip.length} item{equip.length !== 1 ? 's' : ''}
          </div>
        </div>
        <SmallBtn variant="dim" onClick={() => setExpanded(!expanded)}>{expanded ? '−' : '+'}</SmallBtn>
      </div>

      {expanded && (
        <div className="mt-4 space-y-3" style={{ borderTop: '1px solid var(--border)', paddingTop: '12px' }}>

          {/* LINE 1: Character name + Player name on same line */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            <Field label="Character name">
              <input
                className="w-full"
                value={player.name || ''}
                onChange={e => onUpdate(player.id, { name: e.target.value })}
                placeholder="e.g. Johnathan St. Vincent"
                style={{ fontSize: '14px' }}
              />
            </Field>
            <Field label="Player name">
              <input
                className="w-full"
                value={player.playerName || ''}
                onChange={e => onUpdate(player.id, { playerName: e.target.value })}
                placeholder="e.g. Jason Lax"
                style={{ fontSize: '13px' }}
              />
            </Field>
          </div>

          {/* LINE 2: Madness level (1-10) and Willpower (0-10) */}
          <div className="grid grid-cols-2 gap-3">
            <Field label={`Madness Level (${madnessLevel}/10)`}>
              <div className="flex items-center gap-2">
                <SmallBtn variant="dim" onClick={() => setMadnessLevel(madnessLevel - 1)}>−</SmallBtn>
                <input
                  className="flex-1 text-center"
                  type="number"
                  min="1"
                  max="10"
                  value={madnessLevel}
                  onChange={e => setMadnessLevel(parseInt(e.target.value) || 1)}
                  style={{ color: madnessColor, fontWeight: 700 }}
                />
                <SmallBtn variant="dim" onClick={() => setMadnessLevel(madnessLevel + 1)}>+</SmallBtn>
              </div>
            </Field>
            <Field label={`Willpower (${player.willpower ?? 0}/10)`}>
              <div className="flex items-center gap-2">
                <SmallBtn variant="dim" onClick={() => setWillpower((player.willpower || 0) - 1)}>−</SmallBtn>
                <input
                  className="flex-1 text-center"
                  type="number"
                  min="0"
                  max="10"
                  value={player.willpower ?? 0}
                  onChange={e => setWillpower(parseInt(e.target.value) || 0)}
                />
                <SmallBtn variant="dim" onClick={() => setWillpower((player.willpower || 0) + 1)}>+</SmallBtn>
              </div>
            </Field>
          </div>

          {/* LINE 3: Madness type + 7 difficulty boxes */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            <Field label="Madness type">
              <select
                className="w-full"
                value={player.madnessType || '— None —'}
                onChange={e => onUpdate(player.id, { madnessType: e.target.value })}
              >
                {MADNESS_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </Field>
            <Field label="Difficulty checks">
              <div className="flex gap-1 items-center" style={{ flexWrap: 'nowrap' }}>
                {checks.map((on, i) => (
                  <button
                    key={i}
                    onClick={() => toggleCheck(i)}
                    title={`${difficultyLabels[i]} (${difficultyValues[i]})`}
                    style={{
                      flex: 1,
                      minWidth: 0,
                      aspectRatio: '1',
                      maxWidth: '36px',
                      background: on ? 'var(--accent-dim)' : 'transparent',
                      border: '1px solid ' + (on ? 'var(--accent)' : 'var(--border)'),
                      color: on ? 'var(--accent)' : 'var(--ink-faint)',
                      fontFamily: 'var(--font-mono)',
                      fontSize: '13px',
                      cursor: 'pointer',
                      display: 'flex',
                      alignItems: 'center',
                      justifyContent: 'center',
                      fontWeight: 700
                    }}
                  >
                    {on ? '✓' : ''}
                  </button>
                ))}
              </div>
              <div style={{ fontSize: '9px', color: 'var(--ink-faint)', marginTop: '4px', textAlign: 'center', letterSpacing: '0.05em' }}>
                3+ · 5+ · 15+ · 30+ · 35+ · 45+ · 50+
              </div>
            </Field>
          </div>

          {/* LINE 4: HP with +/- 1 and 5 buttons */}
          <Field label="HP">
            <div className="flex items-center gap-2">
              <SmallBtn variant="dim" onClick={() => adjustHP(-5)}>−5</SmallBtn>
              <SmallBtn variant="dim" onClick={() => adjustHP(-1)}>−1</SmallBtn>
              <input
                className="flex-1 text-center"
                type="number"
                value={player.hp ?? 0}
                onChange={e => onUpdate(player.id, { hp: parseInt(e.target.value) || 0 })}
                style={{ fontSize: '15px', fontWeight: 700 }}
              />
              <SmallBtn variant="dim" onClick={() => adjustHP(1)}>+1</SmallBtn>
              <SmallBtn variant="dim" onClick={() => adjustHP(5)}>+5</SmallBtn>
            </div>
          </Field>

          {/* LINE 5: Combat stats — Movement, Hit, Damage, Dodge, Bonus */}
          <div>
            <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', marginBottom: '4px', textTransform: 'uppercase' }}>
              Combat
            </div>
            <div className="grid grid-cols-5 gap-2">
              {[
                { key: 'movement', label: 'Movement' },
                { key: 'hit', label: 'Hit' },
                { key: 'damage', label: 'Damage' },
                { key: 'dodge', label: 'Dodge' },
                { key: 'bonus', label: 'Bonus' }
              ].map(({ key, label }) => (
                <div key={key}>
                  <div style={{ fontSize: '9px', color: 'var(--ink-faint)', textAlign: 'center', marginBottom: '2px', letterSpacing: '0.1em', textTransform: 'uppercase' }}>
                    {label}
                  </div>
                  <input
                    className="w-full text-center"
                    value={player[key] || ''}
                    onChange={e => onUpdate(player.id, { [key]: e.target.value })}
                    placeholder="—"
                    style={{ fontSize: '13px', padding: '6px 4px' }}
                  />
                </div>
              ))}
            </div>
          </div>

          {/* LINE 6: Equipment */}
          <div style={{ background: 'var(--bg-card-2)', border: '1px solid var(--border)', padding: '10px 12px' }}>
            <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: '6px' }}>
              Equipment {equip.length > 0 && <span style={{ color: 'var(--ink-faint)' }}>({equip.length})</span>}
            </div>
            {equip.length > 0 && (
              <div className="space-y-1 mb-2">
                {equip.map((it, i) => (
                  <div key={i} className="flex items-center gap-2">
                    <input
                      value={it}
                      onChange={e => updateEquip(i, e.target.value)}
                      style={{ flex: 1, fontSize: '12px' }}
                    />
                    <SmallBtn variant="dim" onClick={() => removeEquip(i)}>×</SmallBtn>
                  </div>
                ))}
              </div>
            )}
            <input
              value={equipDraft}
              onChange={e => setEquipDraft(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); addEquip(); } }}
              onBlur={addEquip}
              placeholder="+ Add item (press Enter)"
              style={{ width: '100%', fontSize: '12px' }}
            />
          </div>

          {/* LINE 7: ST notes */}
          <Field label="ST notes">
            <textarea
              className="w-full"
              rows={3}
              value={player.notes || ''}
              onChange={e => onUpdate(player.id, { notes: e.target.value })}
              placeholder="Madness symptoms triggered, status effects, side details..."
            />
          </Field>

          <div className="flex justify-end gap-2 pt-2">
            {!confirmDelete ? (
              <SmallBtn variant="danger" onClick={() => setConfirmDelete(true)}>Delete</SmallBtn>
            ) : (
              <>
                <SmallBtn variant="dim" onClick={() => setConfirmDelete(false)}>Cancel</SmallBtn>
                <SmallBtn variant="danger" onClick={() => onDelete(player.id)}>Confirm delete</SmallBtn>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// === HISTORY TAB ===

function HistoryTab({ history, factions, onDelete, onClearAll }) {
  const [query, setQuery] = useState('');
  const [confirmClear, setConfirmClear] = useState(false);

  if (history.length === 0) {
    return (
      <div className="py-20 text-center">
        <div style={{ fontFamily: 'var(--font-display)', fontSize: '20px', color: 'var(--ink-dim)' }}>No resolved jobs yet</div>
      </div>
    );
  }

  const matches = (j) => {
    if (!query.trim()) return true;
    const q = query.toLowerCase();
    const faction = factionById(factions, j.factionId);
    const hay = [j.title, j.missionType, j.sourceLabel, j.sourceType, j.status, faction?.name].filter(Boolean).join(' ').toLowerCase();
    return hay.includes(q);
  };

  const filtered = history.filter(matches);

  const outcomeColor = (o) => ({ clean: 'var(--good)', messy: 'var(--accent)', failed: 'var(--danger)', abandoned: 'var(--danger)' }[o] || 'var(--ink-dim)');
  const outcomeLabel = (o) => ({ clean: 'Clean', messy: 'Messy', failed: 'Failed', abandoned: 'Abandoned' }[o] || o);

  return (
    <div className="py-6 space-y-3">
      <div className="flex items-center justify-between gap-3 flex-wrap">
        <SectionHeader>Resolved Jobs ({history.length})</SectionHeader>
        {!confirmClear ? (
          <SmallBtn variant="dim" onClick={() => setConfirmClear(true)}>Clear all</SmallBtn>
        ) : (
          <div className="flex gap-2 items-center">
            <span style={{ fontSize: '11px', color: 'var(--danger)', letterSpacing: '0.1em' }}>SURE?</span>
            <SmallBtn variant="danger" onClick={() => { onClearAll(); setConfirmClear(false); }}>Yes, wipe all</SmallBtn>
            <SmallBtn variant="dim" onClick={() => setConfirmClear(false)}>No</SmallBtn>
          </div>
        )}
      </div>

      <SearchBar query={query} setQuery={setQuery} placeholder="Search history..." />

      {filtered.length === 0 && query && (
        <div className="py-12 text-center" style={{ color: 'var(--ink-faint)' }}>
          No matches for "{query}"
        </div>
      )}

      <div className="space-y-2">
        {filtered.map(j => {
          const faction = factionById(factions, j.factionId);
          return (
            <HistoryRow
              key={j.id}
              job={j}
              faction={faction}
              factions={factions}
              outcomeColor={outcomeColor}
              outcomeLabel={outcomeLabel}
              onDelete={onDelete}
            />
          );
        })}
      </div>
    </div>
  );
}

function HistoryRow({ job, faction, factions, outcomeColor, outcomeLabel, onDelete }) {
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [expanded, setExpanded] = useState(false);

  const sideEntries = job.sideEffectsApplied
    ? Object.entries(job.sideEffectsApplied).filter(([fid, v]) => v !== 0)
    : [];

  const hasSideEffects = sideEntries.length > 0;
  const hasLoot = Array.isArray(job.loot) && job.loot.length > 0;
  const canExpand = hasSideEffects || hasLoot;

  return (
    <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', padding: '10px 14px' }}>
      <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span style={{ color: 'var(--accent)', fontSize: '12px' }}>{stars(job.tier)}</span>
            <span style={{ fontFamily: 'var(--font-display)', color: 'var(--ink)' }}>{job.title || job.missionType}</span>
            <span style={{ fontSize: '10px', padding: '2px 6px', background: 'transparent', border: '1px solid ' + outcomeColor(job.status), color: outcomeColor(job.status), letterSpacing: '0.1em' }}>{outcomeLabel(job.status).toUpperCase()}</span>
            {hasSideEffects && (
              <span style={{ fontSize: '10px', color: 'var(--accent)', letterSpacing: '0.1em' }}>+{sideEntries.length} SIDE</span>
            )}
            {hasLoot && (
              <span style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.1em' }}>{job.loot.length} LOOT</span>
            )}
          </div>
          <div style={{ fontSize: '11px', color: 'var(--ink-dim)', marginTop: '2px' }}>
            {job.missionType}{faction ? ' · ' + faction.name : ''}
          </div>
        </div>
        <div className="flex items-center gap-3">
          {job.repDelta !== 0 && faction && (
            <div style={{ fontSize: '12px', color: job.repDelta > 0 ? 'var(--good)' : 'var(--danger)', fontWeight: 700 }}>
              {job.repDelta > 0 ? '+' : ''}{job.repDelta} rep
            </div>
          )}
          {canExpand && (
            <SmallBtn variant="dim" onClick={() => setExpanded(!expanded)}>{expanded ? '−' : '+'}</SmallBtn>
          )}
          {!confirmDelete ? (
            <SmallBtn variant="dim" onClick={() => setConfirmDelete(true)}>×</SmallBtn>
          ) : (
            <>
              <SmallBtn variant="dim" onClick={() => setConfirmDelete(false)}>Cancel</SmallBtn>
              <SmallBtn variant="danger" onClick={() => onDelete(job.id)}>Delete</SmallBtn>
            </>
          )}
        </div>
      </div>

      {expanded && (
        <div className="mt-3 pt-3 space-y-3" style={{ borderTop: '1px solid var(--border)' }}>
          {hasSideEffects && (
            <div>
              <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', marginBottom: '6px', textTransform: 'uppercase' }}>
                Side faction effects applied
              </div>
              <div className="space-y-1">
                {sideEntries.map(([fid, val]) => {
                  const f = factionById(factions, fid);
                  if (!f) return null;
                  return (
                    <div key={fid} className="flex justify-between" style={{ fontSize: '11px' }}>
                      <span style={{ color: 'var(--ink)' }}>{f.name}</span>
                      <span style={{ color: val > 0 ? 'var(--good)' : 'var(--danger)', fontWeight: 700 }}>
                        {val > 0 ? '+' : ''}{val}
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          {hasLoot && (
            <div>
              <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', marginBottom: '6px', textTransform: 'uppercase' }}>
                Loot
              </div>
              <ul style={{ margin: 0, paddingLeft: '18px', fontSize: '12px', color: 'var(--ink)', lineHeight: 1.6 }}>
                {job.loot.map((it, i) => <li key={i}>{it}</li>)}
              </ul>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// === RESOLVE MODAL ===

function ResolveModal({ job, faction, factions, goals, onResolve, onCancel }) {
  const [outcome, setOutcome] = useState(null);
  const [sideEffects, setSideEffects] = useState(job.sideEffects || {});
  const [goalEffects, setGoalEffects] = useState(job.goalEffects || {});

  // If this is a goal job (has goalJobLink), update goalEffects to match the outcome's per-outcome impact
  useEffect(() => {
    if (outcome && job.goalJobLink && job.goalJobLink.impactByOutcome) {
      const link = job.goalJobLink;
      const impact = link.impactByOutcome[outcome];
      if (typeof impact === 'number') {
        setGoalEffects(prev => ({ ...prev, [link.goalId]: impact }));
      }
    }
  }, [outcome, job]);

  const options = [
    { id: 'clean', label: 'Clean Success', desc: 'Done well. Maximum rep.', color: 'var(--good)' },
    { id: 'messy', label: 'Messy Success', desc: 'Got it done but with cost. Partial rep.', color: 'var(--accent)' },
    { id: 'failed', label: 'Failed (honest try)', desc: 'They tried, it didn\'t work. Small hit.', color: 'var(--danger)' },
    { id: 'abandoned', label: 'Abandoned', desc: 'They walked away after taking it. Bigger hit.', color: 'var(--danger)' }
  ];

  const updateSideEffect = (fid, val) => {
    const n = parseInt(val);
    const next = { ...sideEffects };
    if (val === '' || isNaN(n)) {
      delete next[fid];
    } else {
      next[fid] = n;
    }
    setSideEffects(next);
  };

  const removeSideEffect = (fid) => {
    const next = { ...sideEffects };
    delete next[fid];
    setSideEffects(next);
  };

  const sideEntries = Object.entries(sideEffects).filter(([fid, v]) => {
    const n = parseInt(v);
    return !isNaN(n) && n !== 0;
  });

  // Goal effect handlers
  const updateGoalEffect = (gid, val) => {
    const n = parseInt(val);
    const next = { ...goalEffects };
    if (val === '' || isNaN(n)) {
      delete next[gid];
    } else {
      next[gid] = n;
    }
    setGoalEffects(next);
  };
  const removeGoalEffect = (gid) => {
    const next = { ...goalEffects };
    delete next[gid];
    setGoalEffects(next);
  };
  const goalEntries = Object.entries(goalEffects).filter(([gid, v]) => {
    const n = parseInt(v);
    return !isNaN(n) && n !== 0;
  });
  const activeGoals = (goals || []).filter(g => g.status !== 'resolved' && g.term === 'seasonal');
  const goalsUsed = new Set(Object.keys(goalEffects));
  const goalsAvailable = activeGoals.filter(g => !goalsUsed.has(g.id));
  const [pickGoalId, setPickGoalId] = useState('');
  const [pickGoalVal, setPickGoalVal] = useState(0);

  const tryCommitGoal = (gid, val) => {
    if (!gid || val === '' || val === '-' || val === 0) return false;
    const n = parseInt(val);
    if (isNaN(n) || n === 0) return false;
    setGoalEffects(prev => ({ ...prev, [gid]: n }));
    setPickGoalId('');
    setPickGoalVal(0);
    return true;
  };

  // Available factions for adding side effects at resolve time
  const usedIds = new Set([job.factionId, ...Object.keys(sideEffects)]);
  const availableForAdd = factions.filter(f => !usedIds.has(f.id));
  const [pickFid, setPickFid] = useState('');
  const [pickVal, setPickVal] = useState(0);

  const confirm = () => {
    let finalSideEffects = sideEffects;
    if (pickFid && pickVal !== '' && pickVal !== 0) {
      const n = parseInt(pickVal);
      if (!isNaN(n) && n !== 0) {
        finalSideEffects = { ...sideEffects, [pickFid]: n };
      }
    }
    let finalGoalEffects = goalEffects;
    if (pickGoalId && pickGoalVal !== '' && pickGoalVal !== 0) {
      const n = parseInt(pickGoalVal);
      if (!isNaN(n) && n !== 0) {
        finalGoalEffects = { ...goalEffects, [pickGoalId]: n };
      }
    }
    onResolve(job, outcome, finalSideEffects, finalGoalEffects);
  };

  const primaryDelta = outcome ? repChangeFor(job.tier, outcome) : 0;

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', zIndex: 50, overflowY: 'auto' }} className="flex items-start justify-center p-4 py-8">
      <div style={{ background: 'var(--bg-card)', border: '1px solid var(--accent)', maxWidth: '560px', width: '100%', padding: '20px' }}>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: '20px', color: 'var(--accent)', marginBottom: '4px' }}>Resolve Job</div>
        <div style={{ fontSize: '13px', color: 'var(--ink)', marginBottom: '16px' }}>
          {stars(job.tier)} {job.title || job.missionType}
        </div>

        {!outcome ? (
          <>
            <div style={{ fontSize: '11px', color: 'var(--ink-dim)', letterSpacing: '0.15em', marginBottom: '8px', textTransform: 'uppercase' }}>
              Step 1: Outcome
            </div>
            <div className="space-y-2">
              {options.map(o => {
                const delta = repChangeFor(job.tier, o.id);
                return (
                  <button
                    key={o.id}
                    onClick={() => setOutcome(o.id)}
                    style={{
                      width: '100%',
                      textAlign: 'left',
                      background: 'transparent',
                      border: '1px solid var(--border)',
                      padding: '12px 14px',
                      cursor: 'pointer',
                      fontFamily: 'var(--font-mono)'
                    }}
                    onMouseEnter={e => e.currentTarget.style.borderColor = o.color}
                    onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border)'}
                  >
                    <div className="flex items-center justify-between gap-3">
                      <div>
                        <div style={{ color: o.color, fontSize: '13px', fontWeight: 700, letterSpacing: '0.05em' }}>{o.label}</div>
                        <div style={{ color: 'var(--ink-dim)', fontSize: '11px', marginTop: '2px' }}>{o.desc}</div>
                      </div>
                      {faction && (
                        <div style={{ fontSize: '13px', color: delta > 0 ? 'var(--good)' : delta < 0 ? 'var(--danger)' : 'var(--ink-dim)', fontWeight: 700 }}>
                          {delta > 0 ? '+' : ''}{delta}
                        </div>
                      )}
                    </div>
                  </button>
                );
              })}
            </div>
            <div className="flex justify-end mt-4">
              <SmallBtn onClick={onCancel} variant="dim">Cancel</SmallBtn>
            </div>
          </>
        ) : (
          <>
            <div style={{ fontSize: '11px', color: 'var(--ink-dim)', letterSpacing: '0.15em', marginBottom: '8px', textTransform: 'uppercase' }}>
              Step 2: Confirm rep changes
            </div>

            {/* Primary faction summary */}
            {faction && primaryDelta !== 0 && (
              <div className="flex items-center justify-between" style={{ background: 'var(--bg-card-2)', border: '1px solid var(--border)', padding: '10px 12px', marginBottom: '8px' }}>
                <div className="flex-1 min-w-0">
                  <div style={{ fontSize: '10px', color: 'var(--ink-faint)', letterSpacing: '0.15em', textTransform: 'uppercase' }}>
                    Primary — {options.find(o => o.id === outcome)?.label}
                  </div>
                  <div style={{ fontSize: '13px', color: 'var(--ink)', marginTop: '2px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {faction.name}
                  </div>
                </div>
                <div style={{ fontSize: '15px', color: primaryDelta > 0 ? 'var(--good)' : 'var(--danger)', fontWeight: 700, padding: '0 8px' }}>
                  {primaryDelta > 0 ? '+' : ''}{primaryDelta}
                </div>
              </div>
            )}

            {/* Loot — read-only display, useful at the table */}
            {Array.isArray(job.loot) && job.loot.length > 0 && (
              <div style={{ marginBottom: '8px' }}>
                <LootEditor loot={job.loot} tier={job.tier} readOnly={true} onChange={() => {}} />
              </div>
            )}

            {/* Side effects */}
            <div style={{ background: 'var(--bg-card-2)', border: '1px solid var(--border)', padding: '10px 12px' }}>
              <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: '8px' }}>
                Side Faction Effects
              </div>

              {sideEntries.length === 0 && availableForAdd.length === 0 && (
                <div style={{ fontSize: '11px', color: 'var(--ink-faint)', fontStyle: 'italic' }}>
                  No other factions available.
                </div>
              )}

              {sideEntries.length > 0 && (
                <div className="space-y-2 mb-2">
                  {sideEntries.map(([fid, val]) => {
                    const f = factionById(factions, fid);
                    if (!f) return null;
                    const n = parseInt(val);
                    return (
                      <div key={fid} className="flex items-center gap-2">
                        <div className="flex-1 min-w-0" style={{ fontSize: '12px', color: 'var(--ink)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                          {f.name}
                        </div>
                        <input
                          type="number"
                          value={val}
                          onChange={e => updateSideEffect(fid, e.target.value)}
                          style={{ width: '70px', textAlign: 'center', color: n > 0 ? 'var(--good)' : n < 0 ? 'var(--danger)' : 'var(--ink)' }}
                        />
                        <SmallBtn variant="dim" onClick={() => removeSideEffect(fid)}>×</SmallBtn>
                      </div>
                    );
                  })}
                </div>
              )}

              {availableForAdd.length > 0 && (
                <div className="flex flex-wrap items-center gap-2" style={sideEntries.length > 0 ? { paddingTop: '8px', borderTop: '1px dashed var(--border)' } : {}}>
                  <select
                    value={pickFid}
                    onChange={e => {
                      const fid = e.target.value;
                      setPickFid(fid);
                      // If a value is already typed, commit immediately on faction select
                      if (fid && pickVal !== '' && pickVal !== 0) {
                        const n = parseInt(pickVal);
                        if (!isNaN(n) && n !== 0) {
                          setSideEffects(prev => ({ ...prev, [fid]: n }));
                          setPickFid('');
                          setPickVal(0);
                        }
                      }
                    }}
                    style={{ flex: '1 1 140px' }}
                  >
                    <option value="">+ Add faction...</option>
                    {availableForAdd.map(f => (
                      <option key={f.id} value={f.id}>{f.name}</option>
                    ))}
                  </select>
                  <input
                    type="number"
                    placeholder="±0"
                    value={pickVal}
                    onChange={e => {
                      const val = e.target.value;
                      setPickVal(val);
                      // If a faction is already selected, commit immediately when value entered
                      if (pickFid && val !== '' && val !== '0' && val !== '-') {
                        const n = parseInt(val);
                        if (!isNaN(n) && n !== 0) {
                          setSideEffects(prev => ({ ...prev, [pickFid]: n }));
                          setPickFid('');
                          setPickVal(0);
                        }
                      }
                    }}
                    onBlur={() => {
                      // Catch any unsaved combination on blur
                      if (pickFid && pickVal !== '' && pickVal !== 0) {
                        const n = parseInt(pickVal);
                        if (!isNaN(n) && n !== 0) {
                          setSideEffects(prev => ({ ...prev, [pickFid]: n }));
                          setPickFid('');
                          setPickVal(0);
                        }
                      }
                    }}
                    style={{ width: '70px', textAlign: 'center' }}
                  />
                </div>
              )}

              {sideEntries.length === 0 && availableForAdd.length > 0 && (
                <div style={{ fontSize: '10px', color: 'var(--ink-faint)', marginTop: '6px', fontStyle: 'italic' }}>
                  Pick a faction and type a number — it'll add automatically.
                </div>
              )}
            </div>

            {/* Goal Effects */}
            <div style={{ background: 'var(--bg-card-2)', border: '1px solid var(--border)', padding: '10px 12px', marginTop: '8px' }}>
              <div className="flex items-center justify-between mb-2">
                <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', textTransform: 'uppercase' }}>
                  Faction Goal Effects
                </div>
                <span style={{ fontSize: '10px', color: 'var(--ink-faint)' }}>
                  Suggested: {GOAL_IMPACT_HINTS[job.tier] || '—'}
                </span>
              </div>

              {activeGoals.length === 0 && (
                <div style={{ fontSize: '11px', color: 'var(--ink-faint)', fontStyle: 'italic' }}>
                  No active faction goals to affect.
                </div>
              )}

              {goalEntries.length > 0 && (
                <div className="space-y-2 mb-2">
                  {goalEntries.map(([gid, val]) => {
                    const g = activeGoals.find(x => x.id === gid) || (goals || []).find(x => x.id === gid);
                    if (!g) return null;
                    const f = factionById(factions, g.factionId);
                    const n = parseInt(val);
                    return (
                      <div key={gid} className="flex items-center gap-2">
                        <div className="flex-1 min-w-0" style={{ fontSize: '12px', color: 'var(--ink)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                          <span style={{ color: 'var(--accent)' }}>{f?.name || '?'}</span>: {g.title}
                          <span style={{ color: 'var(--ink-faint)', marginLeft: '6px' }}>({g.progress}/100)</span>
                        </div>
                        <input
                          type="number"
                          value={val}
                          onChange={e => updateGoalEffect(gid, e.target.value)}
                          style={{ width: '70px', textAlign: 'center', color: n > 0 ? 'var(--good)' : n < 0 ? 'var(--danger)' : 'var(--ink)' }}
                        />
                        <SmallBtn variant="dim" onClick={() => removeGoalEffect(gid)}>×</SmallBtn>
                      </div>
                    );
                  })}
                </div>
              )}

              {goalsAvailable.length > 0 && (
                <div className="flex flex-wrap items-center gap-2" style={goalEntries.length > 0 ? { paddingTop: '8px', borderTop: '1px dashed var(--border)' } : {}}>
                  <select
                    value={pickGoalId}
                    onChange={e => {
                      const gid = e.target.value;
                      setPickGoalId(gid);
                      if (gid) tryCommitGoal(gid, pickGoalVal);
                    }}
                    style={{ flex: '1 1 200px', minWidth: 0, maxWidth: '100%' }}
                  >
                    <option value="">+ Add goal effect...</option>
                    {goalsAvailable.map(g => {
                      const f = factionById(factions, g.factionId);
                      return (
                        <option key={g.id} value={g.id}>
                          {f?.name || '?'}: {g.title} ({g.progress}/100)
                        </option>
                      );
                    })}
                  </select>
                  <input
                    type="number"
                    placeholder="±0"
                    value={pickGoalVal}
                    onChange={e => {
                      const val = e.target.value;
                      setPickGoalVal(val);
                      if (pickGoalId) tryCommitGoal(pickGoalId, val);
                    }}
                    onBlur={() => tryCommitGoal(pickGoalId, pickGoalVal)}
                    style={{ width: '70px', textAlign: 'center' }}
                  />
                </div>
              )}

              {goalEntries.length === 0 && goalsAvailable.length > 0 && (
                <div style={{ fontSize: '10px', color: 'var(--ink-faint)', marginTop: '6px', fontStyle: 'italic' }}>
                  Optional. If this job moved a faction's goal, pick it and type the change.
                </div>
              )}
            </div>

            <div className="flex justify-between gap-2 mt-5">
              <SmallBtn onClick={() => setOutcome(null)} variant="dim">← Back</SmallBtn>
              <div className="flex gap-2">
                <SmallBtn onClick={onCancel} variant="dim">Cancel</SmallBtn>
                <SmallBtn onClick={confirm} variant="accent">Confirm Resolve</SmallBtn>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// === CHAIN MODAL ===

function ChainModal({ prompt, factions, library, onAccept, onSkip }) {
  const [picked, setPicked] = useState(null);

  const generate = (missionType) => {
    let foundLib = null;
    let foundTier = null;
    for (const t of [1,2,3,4,5]) {
      const lib = (library[t] || []).find(m => m.type === missionType);
      if (lib) { foundLib = lib; foundTier = t; break; }
    }
    if (!foundLib) return;

    const complications = foundLib.complications || [];
    const complication = complications.length > 0
      ? complications[Math.floor(Math.random() * complications.length)]
      : '';
    const newJob = {
      title: '',
      sourceType: prompt.parent.sourceType,
      sourceLabel: prompt.parent.sourceLabel,
      tier: foundTier,
      missionType: foundLib.type,
      structure: foundLib.structure,
      complication,
      reward: foundLib.rewardRange,
      daysRemaining: foundLib.timeDefault,
      notes: `Chained from "${prompt.parent.title || prompt.parent.missionType}" (${prompt.outcome})`
    };
    onAccept(newJob);
  };

  const outcomeLabel = { clean: 'Clean Success', messy: 'Messy Success', failed: 'Failed' }[prompt.outcome];

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', zIndex: 50 }} className="flex items-center justify-center p-4">
      <div style={{ background: 'var(--bg-card)', border: '1px solid var(--accent)', maxWidth: '520px', width: '100%', padding: '20px' }}>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: '20px', color: 'var(--accent)', marginBottom: '4px' }}>Chain Suggestion</div>
        <div style={{ fontSize: '12px', color: 'var(--ink-dim)', marginBottom: '16px' }}>
          After <span style={{ color: 'var(--ink)' }}>{outcomeLabel}</span> on {prompt.parent.missionType}, the world might offer:
        </div>
        <div className="space-y-2">
          {prompt.suggestions.map(s => (
            <button
              key={s}
              onClick={() => generate(s)}
              style={{
                width: '100%',
                textAlign: 'left',
                background: 'transparent',
                border: '1px solid var(--border)',
                padding: '12px 14px',
                cursor: 'pointer',
                fontFamily: 'var(--font-mono)',
                color: 'var(--ink)'
              }}
              onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--accent)'}
              onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border)'}
            >
              <div style={{ fontSize: '14px', fontWeight: 700 }}>{s}</div>
            </button>
          ))}
        </div>
        <div className="flex justify-end mt-4">
          <SmallBtn onClick={onSkip} variant="dim">Skip — no follow-up</SmallBtn>
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
