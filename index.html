function FactionCard({ faction, goals, allFactions, onUpdate, onDelete, onAdjust, onSet, onClearHistory, onAddGoal, onUpdateGoal, onDeleteGoal, onAdvanceGoal }) {
  const [expanded, setExpanded] = useState(false);
  const [editing, setEditing] = useState(false);
  const [adjustVal, setAdjustVal] = useState(0);
  const [adjustReason, setAdjustReason] = useState('');
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [confirmClearHistory, setConfirmClearHistory] = useState(false);
  const [addingLongTermGoal, setAddingLongTermGoal] = useState(false);
  const [editingGoalId, setEditingGoalId] = useState(null);

  const repColor = faction.rep <= -50 ? 'var(--danger)' : faction.rep < 0 ? 'var(--ink-dim)' : faction.rep < 25 ? 'var(--ink)' : faction.rep < 70 ? 'var(--good)' : 'var(--accent)';

  const unlocked = [1,2,3,4,5].filter(t => tierUnlocked(faction.rep, t));

  // Long-term goals owned by this faction
  const longTermGoals = (goals || []).filter(g => g.factionId === faction.id && g.term === 'long' && g.status !== 'resolved');

  return (
    <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', padding: '14px 16px' }}>
      <div className="flex items-start justify-between gap-3 flex-wrap">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-3 flex-wrap">
            <span style={{ fontFamily: 'var(--font-display)', fontSize: '17px', color: 'var(--ink)' }}>{faction.name}</span>
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: '14px', color: repColor, fontWeight: 700 }}>
              REP: {faction.rep > 0 ? '+' : ''}{faction.rep}
            </span>
          </div>
          <div style={{ fontSize: '11px', color: 'var(--ink-faint)', marginTop: '4px' }}>
            Unlocked tiers: {unlocked.length === 0 ? '— none —' : unlocked.map(t => stars(t)).join('  ')}
            {longTermGoals.length > 0 && (
              <span> · <span style={{ color: 'var(--accent)' }}>{longTermGoals.length}</span> long-term goal{longTermGoals.length !== 1 ? 's' : ''}</span>
            )}
          </div>
        </div>
        <div className="flex gap-2">
          <SmallBtn onClick={() => setExpanded(!expanded)} variant="dim">{expanded ? '−' : '+'}</SmallBtn>
        </div>
      </div>

      {expanded && (
        <div className="mt-4 space-y-3" style={{ borderTop: '1px solid var(--border)', paddingTop: '12px' }}>
          {!editing ? (
            <>
              {faction.notes && <div style={{ fontSize: '12px', color: 'var(--ink-dim)', whiteSpace: 'pre-wrap' }}>{faction.notes}</div>}

              <div style={{ background: 'var(--bg-card-2)', padding: '10px', border: '1px solid var(--border)' }}>
                <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', marginBottom: '6px' }}>QUICK ADJUST  (range: −100 to +100)</div>
                <div className="flex gap-2 items-center flex-wrap">
                  <input type="number" value={adjustVal} onChange={e => setAdjustVal(parseInt(e.target.value) || 0)} style={{ width: '70px' }} />
                  <input value={adjustReason} onChange={e => setAdjustReason(e.target.value)} placeholder="Reason (optional)" style={{ flex: 1, minWidth: '140px' }} />
                  <SmallBtn onClick={() => { if (adjustVal !== 0) { onAdjust(faction.id, adjustVal, adjustReason); setAdjustVal(0); setAdjustReason(''); } }}>Apply Δ</SmallBtn>
                  <SmallBtn variant="dim" onClick={() => { onSet(faction.id, adjustVal, adjustReason || 'Set value'); setAdjustVal(0); setAdjustReason(''); }}>Set =</SmallBtn>
                </div>
              </div>

              {faction.history.length > 0 && (
                <div>
                  <div className="flex items-center justify-between mb-1">
                    <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em' }}>REP HISTORY ({faction.history.length})</div>
                    {!confirmClearHistory ? (
                      <button
                        onClick={() => setConfirmClearHistory(true)}
                        style={{ background: 'transparent', border: 'none', color: 'var(--ink-faint)', fontSize: '10px', letterSpacing: '0.1em', cursor: 'pointer', textTransform: 'uppercase' }}
                      >Clear history</button>
                    ) : (
                      <div className="flex gap-2 items-center">
                        <span style={{ fontSize: '10px', color: 'var(--danger)', letterSpacing: '0.1em' }}>SURE?</span>
                        <SmallBtn variant="danger" onClick={() => { onClearHistory(faction.id); setConfirmClearHistory(false); }}>Yes, clear</SmallBtn>
                        <SmallBtn variant="dim" onClick={() => setConfirmClearHistory(false)}>No</SmallBtn>
                      </div>
                    )}
                  </div>
                  <div className="space-y-1 max-h-48 overflow-y-auto">
                    {faction.history.slice(0, 30).map((h, i) => (
                      <div key={i} className="flex justify-between gap-3" style={{ fontSize: '11px', color: 'var(--ink-dim)', padding: '2px 0', borderBottom: '1px dotted var(--border)' }}>
                        <span style={{ flex: 1, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{h.reason}</span>
                        <span style={{ color: h.change > 0 ? 'var(--good)' : h.change < 0 ? 'var(--danger)' : 'var(--ink-dim)', fontWeight: 700 }}>
                          {h.change > 0 ? '+' : ''}{h.change}
                        </span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div style={{ background: 'var(--bg-card-2)', padding: '10px', border: '1px solid var(--border)' }}>
                <div className="flex items-center justify-between mb-2">
                  <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em' }}>
                    LONG-TERM GOALS ({longTermGoals.length})
                  </div>
                  {!addingLongTermGoal && longTermGoals.length === 0 && (
                    <SmallBtn variant="dim" onClick={() => setAddingLongTermGoal(true)}>+ Add</SmallBtn>
                  )}
                  {longTermGoals.length > 0 && !addingLongTermGoal && (
                    <span style={{ fontSize: '10px', color: 'var(--ink-faint)', fontStyle: 'italic' }}>1 max — resolve first</span>
                  )}
                </div>

                {addingLongTermGoal && (
                  <div className="mb-3">
                    <GoalForm
                      mode="create"
                      goal={{ factionId: faction.id, term: 'long', progress: 0 }}
                      factions={allFactions}
                      existingGoals={goals}
                      lockFaction={true}
                      lockTerm={true}
                      onSave={(data) => { onAddGoal(data); setAddingLongTermGoal(false); }}
                      onCancel={() => setAddingLongTermGoal(false)}
                    />
                  </div>
                )}

                {longTermGoals.length === 0 && !addingLongTermGoal && (
                  <div style={{ fontSize: '11px', color: 'var(--ink-faint)', fontStyle: 'italic', padding: '6px 0' }}>
                    No long-term goals for this faction.
                  </div>
                )}

                {longTermGoals.length > 0 && (
                  <div className="space-y-2">
                    {longTermGoals.map(g => (
                      <LongTermGoalRow
                        key={g.id}
                        goal={g}
                        factions={allFactions}
                        goals={goals}
                        editing={editingGoalId === g.id}
                        onStartEdit={() => setEditingGoalId(g.id)}
                        onCancelEdit={() => setEditingGoalId(null)}
                        onSave={(patch) => { onUpdateGoal(g.id, patch); setEditingGoalId(null); }}
                        onDelete={() => onDeleteGoal(g.id)}
                        onAdvance={onAdvanceGoal}
                      />
                    ))}
                  </div>
                )}
              </div>

              <div className="flex gap-2 justify-end pt-2">
                <SmallBtn onClick={() => setEditing(true)} variant="dim">Edit</SmallBtn>
                {!confirmDelete ? (
                  <SmallBtn onClick={() => setConfirmDelete(true)} variant="danger">Delete</SmallBtn>
                ) : (
                  <>
                    <SmallBtn onClick={() => setConfirmDelete(false)} variant="dim">Cancel</SmallBtn>
                    <SmallBtn onClick={() => { onDelete(faction.id); }} variant="danger">Confirm Delete</SmallBtn>
                  </>
                )}
              </div>
            </>
          ) : (
            <>
              <Field label="Name"><input className="w-full" value={faction.name} onChange={e => onUpdate(faction.id, { name: e.target.value })} /></Field>
              <Field label="Notes"><textarea className="w-full" rows={3} value={faction.notes} onChange={e => onUpdate(faction.id, { notes: e.target.value })} /></Field>
              <div className="flex justify-end"><SmallBtn onClick={() => setEditing(false)} variant="accent">Done</SmallBtn></div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

function LongTermGoalRow({ goal, factions, goals, editing, onStartEdit, onCancelEdit, onSave, onDelete, onAdvance }) {
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [bumpVal, setBumpVal] = useState('');
  const [bumpReason, setBumpReason] = useState('');
  const progressColor = goal.progress >= 90 ? 'var(--accent)' : goal.progress >= 60 ? 'var(--good)' : goal.progress >= 30 ? 'var(--ink)' : 'var(--ink-dim)';

  if (editing) {
    return (
      <GoalForm
        mode="edit"
        goal={goal}
        factions={factions}
        existingGoals={goals}
        lockFaction={true}
        lockTerm={true}
        onSave={onSave}
        onCancel={onCancelEdit}
      />
    );
  }

  const applyBump = () => {
    const n = parseInt(bumpVal);
    if (isNaN(n) || n === 0) return;
    onAdvance(goal.id, n, bumpReason || 'Manual adjustment', 'manual');
    setBumpVal('');
    setBumpReason('');
  };

  return (
    <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', padding: '10px 12px' }}>
      <div className="flex items-center justify-between gap-3 flex-wrap mb-2">
        <div className="flex-1 min-w-0">
          <div style={{ fontSize: '13px', color: 'var(--ink)', fontFamily: 'var(--font-display)' }}>
            {goal.title}
          </div>
          {goal.description && (
            <div style={{ fontSize: '11px', color: 'var(--ink-dim)', marginTop: '2px', whiteSpace: 'pre-wrap' }}>
              {goal.description}
            </div>
          )}
        </div>
      </div>

      <div className="flex items-center gap-3 mb-2">
        <div className="flex-1" style={{ background: 'var(--bg-card-2)', height: '14px', position: 'relative', border: '1px solid var(--border)' }}>
          <div style={{
            width: `${goal.progress}%`,
            height: '100%',
            background: progressColor,
            opacity: 0.4
          }} />
          <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '10px', color: 'var(--ink)', fontWeight: 700, letterSpacing: '0.1em' }}>
            {goal.progress}/100
          </div>
        </div>
      </div>

      <div className="flex gap-1 flex-wrap mb-2">
        {[-10, -5, +5, +10].map(n => (
          <button
            key={n}
            onClick={() => onAdvance(goal.id, n, 'Quick adjust', 'manual')}
            style={{
              background: 'transparent', border: '1px solid var(--border)',
              color: n > 0 ? 'var(--good)' : 'var(--danger)',
              fontFamily: 'var(--font-mono)', fontSize: '10px',
              padding: '3px 8px', cursor: 'pointer', letterSpacing: '0.05em'
            }}
          >
            {n > 0 ? '+' : ''}{n}
          </button>
        ))}
        <input
          type="number"
          value={bumpVal}
          onChange={e => setBumpVal(e.target.value)}
          placeholder="±"
          style={{ width: '60px', textAlign: 'center', fontSize: '11px' }}
        />
        <input
          value={bumpReason}
          onChange={e => setBumpReason(e.target.value)}
          placeholder="reason (optional)"
          style={{ flex: 1, minWidth: '120px', fontSize: '11px' }}
        />
        <SmallBtn variant="dim" onClick={applyBump}>Apply</SmallBtn>
      </div>

      <div style={{ fontSize: '10px', color: 'var(--ink-faint)', fontStyle: 'italic', marginBottom: '6px' }}>
        Long-term goals advance automatically when linked seasonal goals succeed (+10 each). Manual adjustments are for story events.
      </div>

      <div className="flex gap-2 justify-end">
        <SmallBtn variant="dim" onClick={onStartEdit}>Edit</SmallBtn>
        {!confirmDelete ? (
          <SmallBtn variant="danger" onClick={() => setConfirmDelete(true)}>Delete</SmallBtn>
        ) : (
          <>
            <SmallBtn variant="dim" onClick={() => setConfirmDelete(false)}>Cancel</SmallBtn>
            <SmallBtn variant="danger" onClick={onDelete}>Confirm</SmallBtn>
          </>
        )}
      </div>
    </div>
  );
}

  const [activeTier, setActiveTier] = useState(1);
  const [adding, setAdding] = useState(false);
  const [confirmReset, setConfirmReset] = useState(false);

  const tiers = [1, 2, 3, 4, 5];
  const missions = [...(library[activeTier] || [])].sort((a, b) => (a.type || '').localeCompare(b.type || ''));

  return (
    <div className="py-6 space-y-4">
      <div className="flex items-center justify-between gap-3 flex-wrap">
        <SectionHeader>Job Library</SectionHeader>
        {!confirmReset ? (
          <SmallBtn variant="dim" onClick={() => setConfirmReset(true)}>Reset to defaults</SmallBtn>
        ) : (
          <div className="flex gap-2 items-center">
            <span style={{ fontSize: '11px', color: 'var(--danger)', letterSpacing: '0.1em' }}>OVERWRITES YOUR EDITS — SURE?</span>
            <SmallBtn variant="danger" onClick={() => { onReset(); setConfirmReset(false); }}>Yes, reset</SmallBtn>
            <SmallBtn variant="dim" onClick={() => setConfirmReset(false)}>No</SmallBtn>
          </div>
        )}
      </div>

      <div style={{ fontSize: '12px', color: 'var(--ink-dim)', lineHeight: 1.5 }}>

      </div>

      <div className="flex gap-1 flex-wrap">
        {tiers.map(t => (
          <button
            key={t}
            onClick={() => { setActiveTier(t); setAdding(false); }}
            style={{
              flex: '1 1 100px',
              padding: '8px 4px',
              background: activeTier === t ? 'var(--accent-dim)' : 'transparent',
              border: '1px solid ' + (activeTier === t ? 'var(--accent)' : 'var(--border)'),
              color: activeTier === t ? 'var(--ink)' : 'var(--ink-dim)',
              fontFamily: 'var(--font-mono)',
              fontSize: '12px',
              cursor: 'pointer'
            }}
          >
            {stars(t)}
            <div style={{ fontSize: '9px', marginTop: '2px', letterSpacing: '0.1em' }}>
              {(library[t] || []).length} TYPES
            </div>
          </button>
        ))}
      </div>

      <div className="flex justify-end">
        {!adding && <SmallBtn variant="accent" onClick={() => setAdding(true)}>+ Add Mission Type to {stars(activeTier)}</SmallBtn>}
      </div>

      {adding && (
        <AddMissionForm
          tier={activeTier}
          onSave={(mission) => { onAdd(activeTier, mission); setAdding(false); }}
          onCancel={() => setAdding(false)}
        />
      )}

      {missions.length === 0 && !adding && (
        <div className="py-12 text-center" style={{ color: 'var(--ink-faint)', fontSize: '13px' }}>
          No mission types at this tier. Add one above.
        </div>
      )}

      <div className="space-y-3">
        {missions.map(m => (
          <MissionTypeCard
            key={m.type}
            tier={activeTier}
            mission={m}
            onUpdate={(patch) => onUpdate(activeTier, m.type, patch)}
            onDelete={() => onDelete(activeTier, m.type)}
          />
        ))}
      </div>
    </div>
  );
}

function AddMissionForm({ tier, onSave, onCancel }) {
  const [type, setType] = useState('');
  const [structure, setStructure] = useState('');
  const [rewardRange, setRewardRange] = useState('');
  const [timeDefault, setTimeDefault] = useState(7);
  const [complications, setComplications] = useState(['']);

  const updateComp = (i, v) => setComplications(prev => prev.map((c, idx) => idx === i ? v : c));
  const addComp = () => setComplications(prev => [...prev, '']);
  const removeComp = (i) => setComplications(prev => prev.filter((_, idx) => idx !== i));

  const canSave = type.trim() && structure.trim();

  const handleSave = () => {
    if (!canSave) return;
    const cleanComps = complications.map(c => c.trim()).filter(Boolean);
    onSave({
      type: type.trim(),
      structure: structure.trim(),
      complications: cleanComps,
      rewardRange: rewardRange.trim() || `Tier ${tier} reward`,
      timeDefault: parseInt(timeDefault) || 7
    });
  };

  return (
    <div style={{ background: 'var(--bg-card)', border: '1px dashed var(--accent)', padding: '14px' }} className="space-y-3">
      <div style={{ fontFamily: 'var(--font-display)', fontSize: '15px', color: 'var(--accent)' }}>
        New Mission Type — {stars(tier)}
      </div>

      <Field label="Type name (verb — what the players are doing)">
        <input className="w-full" value={type} onChange={e => setType(e.target.value)} placeholder="e.g. Smuggle, Pacify, Decode..." />
      </Field>

      <Field label="Structure (the bones — what makes this mission this mission)">
        <textarea className="w-full" rows={3} value={structure} onChange={e => setStructure(e.target.value)} placeholder="A short paragraph describing the core shape of this mission type..." />
      </Field>

      <div className="grid grid-cols-2 gap-3">
        <Field label="Reward range">
          <input className="w-full" value={rewardRange} onChange={e => setRewardRange(e.target.value)} placeholder="e.g. 50-100 bullets" />
        </Field>
        <Field label="Default days">
          <input className="w-full" type="number" value={timeDefault} onChange={e => setTimeDefault(parseInt(e.target.value) || 0)} />
        </Field>
      </div>

      <div>
        <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', marginBottom: '6px', textTransform: 'uppercase' }}>
          Complications (one per line — generator picks one at random)
        </div>
        <div className="space-y-2">
          {complications.map((c, i) => (
            <div key={i} className="flex gap-2">
              <input className="flex-1" value={c} onChange={e => updateComp(i, e.target.value)} placeholder="What can go wrong..." />
              <SmallBtn variant="dim" onClick={() => removeComp(i)}>×</SmallBtn>
            </div>
          ))}
          <SmallBtn variant="dim" onClick={addComp}>+ Add complication</SmallBtn>
        </div>
      </div>

      <div className="flex justify-end gap-2 pt-2">
        <SmallBtn variant="dim" onClick={onCancel}>Cancel</SmallBtn>
        <SmallBtn variant="accent" onClick={handleSave}>Save mission type</SmallBtn>
      </div>
      {!canSave && (
        <div style={{ fontSize: '10px', color: 'var(--ink-faint)', textAlign: 'right' }}>
          Type name and structure are required.
        </div>
      )}
    </div>
  );
}

function MissionTypeCard({ tier, mission, onUpdate, onDelete }) {
  const [expanded, setExpanded] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);

  const updateComp = (i, v) => {
    const next = [...(mission.complications || [])];
    next[i] = v;
    onUpdate({ complications: next });
  };
  const addComp = () => {
    onUpdate({ complications: [...(mission.complications || []), ''] });
  };
  const removeComp = (i) => {
    onUpdate({ complications: (mission.complications || []).filter((_, idx) => idx !== i) });
  };

  return (
    <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', padding: '14px 16px' }}>
      <div className="flex items-center justify-between gap-3">
        <div className="flex-1 min-w-0">
          <div style={{ fontFamily: 'var(--font-display)', fontSize: '17px', color: 'var(--ink)' }}>{mission.type}</div>
          <div style={{ fontSize: '11px', color: 'var(--ink-faint)', marginTop: '2px' }}>
            {(mission.complications || []).length} complications · {mission.rewardRange} · {mission.timeDefault}d default
          </div>
        </div>
        <SmallBtn variant="dim" onClick={() => setExpanded(!expanded)}>{expanded ? '−' : '+'}</SmallBtn>
      </div>

      {expanded && (
        <div className="mt-4 space-y-3" style={{ borderTop: '1px solid var(--border)', paddingTop: '12px' }}>
          <Field label="Type name">
            <input className="w-full" value={mission.type} onChange={e => onUpdate({ type: e.target.value })} />
          </Field>

          <Field label="Structure">
            <textarea className="w-full" rows={3} value={mission.structure} onChange={e => onUpdate({ structure: e.target.value })} />
          </Field>

          <div className="grid grid-cols-2 gap-3">
            <Field label="Reward range">
              <input className="w-full" value={mission.rewardRange} onChange={e => onUpdate({ rewardRange: e.target.value })} />
            </Field>
            <Field label="Default days">
              <input className="w-full" type="number" value={mission.timeDefault} onChange={e => onUpdate({ timeDefault: parseInt(e.target.value) || 0 })} />
            </Field>
          </div>

          <div>
            <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', marginBottom: '6px', textTransform: 'uppercase' }}>
              Complications
            </div>
            <div className="space-y-2">
              {(mission.complications || []).map((c, i) => (
                <div key={i} className="flex gap-2">
                  <input className="flex-1" value={c} onChange={e => updateComp(i, e.target.value)} />
                  <SmallBtn variant="dim" onClick={() => removeComp(i)}>×</SmallBtn>
                </div>
              ))}
              <SmallBtn variant="dim" onClick={addComp}>+ Add complication</SmallBtn>
            </div>
          </div>

          <div className="flex justify-end gap-2 pt-2">
            {!confirmDelete ? (
              <SmallBtn variant="danger" onClick={() => setConfirmDelete(true)}>Delete this mission type</SmallBtn>
            ) : (
              <>
                <SmallBtn variant="dim" onClick={() => setConfirmDelete(false)}>Cancel</SmallBtn>
                <SmallBtn variant="danger" onClick={onDelete}>Confirm delete</SmallBtn>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// === STORY TAB ===

function StoryTab({ missions, factions, onAdd, onUpdate, onDelete, onResolveStart }) {
  const [creating, setCreating] = useState(false);
  const [query, setQuery] = useState('');

  const matches = (m) => {
    if (!query.trim()) return true;
    const q = query.toLowerCase();
    const hay = [m.title, m.description, m.notes, ...(m.npcs || [])].filter(Boolean).join(' ').toLowerCase();
    return hay.includes(q);
  };

  const filtered = missions.filter(matches);
  const active = filtered.filter(m => m.status === 'active');
  const planned = filtered.filter(m => m.status === 'planned');
  const resolved = filtered.filter(m => m.status === 'resolved');

  return (
    <div className="py-6 space-y-5">
      <div className="flex items-center justify-between gap-3 flex-wrap">
        <SectionHeader>Story Arcs</SectionHeader>
        {!creating && <SmallBtn variant="accent" onClick={() => setCreating(true)}>+ New Story Mission</SmallBtn>}
      </div>

      <div style={{ fontSize: '12px', color: 'var(--ink-dim)', lineHeight: 1.5 }}>
        Story arcs run alongside the job board. They don't expire seasonally and aren't tier-gated. When you resolve one, you set rep changes for any factions involved — positive or negative, however much you want.
      </div>

      {creating && (
        <StoryMissionForm
          mode="create"
          factions={factions}
          onSave={(mission) => { onAdd(mission); setCreating(false); }}
          onCancel={() => setCreating(false)}
        />
      )}

      {missions.length > 0 && (
        <SearchBar query={query} setQuery={setQuery} placeholder="Search story arcs..." />
      )}

      {missions.length === 0 && !creating && (
        <div className="py-12 text-center" style={{ color: 'var(--ink-faint)', fontSize: '13px' }}>
          No story missions yet. Create one above to start tracking the campaign's main arcs.
        </div>
      )}

      {active.length > 0 && (
        <section>
          <SubHeader>In Play ({active.length})</SubHeader>
          <div className="space-y-3 mt-2">
            {active.map(m => (
              <StoryMissionCard key={m.id} mission={m} factions={factions} onUpdate={onUpdate} onDelete={onDelete} onResolveStart={onResolveStart} />
            ))}
          </div>
        </section>
      )}

      {planned.length > 0 && (
        <section>
          <SubHeader>Planned ({planned.length})</SubHeader>
          <div className="space-y-3 mt-2">
            {planned.map(m => (
              <StoryMissionCard key={m.id} mission={m} factions={factions} onUpdate={onUpdate} onDelete={onDelete} onResolveStart={onResolveStart} />
            ))}
          </div>
        </section>
      )}

      {resolved.length > 0 && (
        <section>
          <SubHeader>Resolved ({resolved.length})</SubHeader>
          <div className="space-y-3 mt-2">
            {resolved.map(m => (
              <StoryMissionCard key={m.id} mission={m} factions={factions} onUpdate={onUpdate} onDelete={onDelete} onResolveStart={onResolveStart} />
            ))}
          </div>
        </section>
      )}
    </div>
  );
}

function SubHeader({ children }) {
  return (
    <div style={{
      fontFamily: 'var(--font-display)',
      fontSize: '14px',
      color: 'var(--ink-dim)',
      letterSpacing: '0.1em',
      textTransform: 'uppercase'
    }}>
      {children}

}

  const [description, setDescription] = useState(mission?.description || '');
  const [notes, setNotes] = useState(mission?.notes || '');

  const addNpc = () => setNpcs(prev => [...prev, '']);
  const removeNpc = (i) => setNpcs(prev => prev.filter((_, idx) => idx !== i));

  const canSave = title.trim();

  const handleSave = () => {
    if (!canSave) return;
    onSave({
      ...(mission || {}),
      title: title.trim(),
      description: description.trim(),
      notes: notes.trim(),
      npcs: npcs.map(n => n.trim()).filter(Boolean),
      status
    });
  };

  return (
    <div style={{ background: 'var(--bg-card)', border: '1px dashed var(--accent)', padding: '14px' }} className="space-y-3">
      <div style={{ fontFamily: 'var(--font-display)', fontSize: '15px', color: 'var(--accent)' }}>
        {mode === 'create' ? 'New Story Mission' : 'Edit Story Mission'}
      </div>

      <Field label="Title">
        <input className="w-full" value={title} onChange={e => setTitle(e.target.value)} placeholder="e.g. The Langil Conspiracy, Faust's Mountain Gambit..." />

      <Field label="Description (the arc — what's at stake, what the players know)">
        <textarea className="w-full" rows={3} value={description} onChange={e => setDescription(e.target.value)} placeholder="Short summary of the arc..." />
      </Field>

      <div>
        <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', marginBottom: '6px', textTransform: 'uppercase' }}>
          Involved NPCs
        </div>
        <div className="space-y-2">
          {npcs.map((n, i) => (
            <div key={i} className="flex gap-2">
              <input className="flex-1" value={n} onChange={e => updateNpc(i, e.target.value)} placeholder="Name and one-line role..." />
              <SmallBtn variant="dim" onClick={() => removeNpc(i)}>×</SmallBtn>
            </div>
          ))}
          <SmallBtn variant="dim" onClick={addNpc}>+ Add NPC</SmallBtn>
        </div>

      <Field label="ST notes (private — beats, branches, hidden info)">

      </Field>

      <Field label="Status">
        <div className="flex gap-2">
          {['planned', 'active'].map(s => (
            <button

                flex: 1,
                padding: '6px 0',
                background: status === s ? 'var(--accent-dim)' : 'transparent',
                border: '1px solid ' + (status === s ? 'var(--accent)' : 'var(--border)'),
                color: status === s ? 'var(--ink)' : 'var(--ink-dim)',
                fontFamily: 'var(--font-mono)',
                fontSize: '12px',
                letterSpacing: '0.1em',
                textTransform: 'uppercase',
                cursor: 'pointer'
              }}
            >
              {s}
            </button>
          ))}
        </div>
      </Field>

      <div className="flex justify-end gap-2 pt-2">
        <SmallBtn variant="dim" onClick={onCancel}>Cancel</SmallBtn>
        <SmallBtn variant="accent" onClick={handleSave}>{mode === 'create' ? 'Create' : 'Save'}</SmallBtn>
      </div>
      {!canSave && (
        <div style={{ fontSize: '10px', color: 'var(--ink-faint)', textAlign: 'right' }}>Title is required.</div>
      )}
    </div>
  );
}

function StoryMissionCard({ mission, factions, onUpdate, onDelete, onResolveStart }) {

  const [editing, setEditing] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);

  const statusColor = {
    planned: 'var(--ink-dim)',
    active: 'var(--accent)',
    resolved: 'var(--good)'

  if (editing) {
    return (
      <StoryMissionForm
        mode="edit"
        mission={mission}

  return (
    <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', padding: '14px 16px' }}>
      <div className="flex items-start justify-between gap-3 flex-wrap">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-3 flex-wrap">
            <span style={{ fontFamily: 'var(--font-display)', fontSize: '18px', color: 'var(--ink)' }}>{mission.title}</span>

          {mission.description && (

        <div className="flex gap-2 flex-shrink-0">
          {mission.status === 'planned' && (
            <SmallBtn onClick={() => onUpdate(mission.id, { status: 'active' })}>Activate</SmallBtn>
          )}
          {mission.status === 'active' && (
            <SmallBtn variant="accent" onClick={() => onResolveStart(mission)}>Resolve</SmallBtn>
          )}

        <div className="mt-4 space-y-3" style={{ borderTop: '1px solid var(--border)', paddingTop: '12px' }}>
          {mission.npcs && mission.npcs.length > 0 && (
            <div>
              <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', marginBottom: '4px', textTransform: 'uppercase' }}>NPCs</div>
              <ul className="space-y-1" style={{ fontSize: '12px', color: 'var(--ink)' }}>
                {mission.npcs.map((n, i) => (
                  <li key={i} style={{ paddingLeft: '12px', borderLeft: '2px solid var(--border)', color: 'var(--ink)' }}>{n}</li>

              </ul>

              <div style={{ fontSize: '12px', color: 'var(--ink-dim)', whiteSpace: 'pre-wrap', lineHeight: 1.5, padding: '8px 10px', background: 'var(--bg-card-2)', border: '1px solid var(--border)' }}>
                {mission.notes}
              </div>

          {mission.status === 'resolved' && mission.repChanges && Object.keys(mission.repChanges).length > 0 && (

              <SmallBtn variant="danger" onClick={() => setConfirmDelete(true)}>Delete</SmallBtn>

              <>
                <SmallBtn variant="dim" onClick={() => setConfirmDelete(false)}>Cancel</SmallBtn>

              </>

        </div>
      )}

function ResolveStoryModal({ mission, factions, onResolve, onCancel }) {
  const [outcomeNote, setOutcomeNote] = useState('');
  const [repChanges, setRepChanges] = useState({});

  const setDelta = (factionId, val) => {
    setRepChanges(prev => ({ ...prev, [factionId]: val }));
  };

  const handleResolve = () => {
    // Filter out 0/empty entries, parse to int
    const cleaned = {};
    for (const [fid, val] of Object.entries(repChanges)) {
      const n = parseInt(val);
      if (!isNaN(n) && n !== 0) cleaned[fid] = n;
    }
    onResolve(mission, cleaned, outcomeNote.trim());
  };

  const totalAffected = Object.values(repChanges).filter(v => parseInt(v) && parseInt(v) !== 0).length;

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', zIndex: 50, overflowY: 'auto' }} className="flex items-start justify-center p-4 py-8">
      <div style={{ background: 'var(--bg-card)', border: '1px solid var(--accent)', maxWidth: '560px', width: '100%', padding: '20px' }}>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: '20px', color: 'var(--accent)', marginBottom: '4px' }}>Resolve Story Mission</div>
        <div style={{ fontSize: '14px', color: 'var(--ink)', marginBottom: '16px' }}>
          {mission.title}
        </div>

        <div className="space-y-4">
          <Field label="Outcome (one line — what happened)">
            <input className="w-full" value={outcomeNote} onChange={e => setOutcomeNote(e.target.value)} placeholder='e.g. "Langil exposed publicly, Faust takes credit"' />
          </Field>

          <div>
            <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', marginBottom: '8px', textTransform: 'uppercase' }}>
              Faction Rep Changes (positive or negative — leave blank to skip)
            </div>
            <div className="space-y-2">
              {factions.length === 0 && (
                <div style={{ fontSize: '12px', color: 'var(--ink-faint)' }}>No factions to affect.</div>
              )}
              {sortFactions(factions).map(f => (
                <div key={f.id} className="flex items-center gap-3" style={{ padding: '6px 8px', background: 'var(--bg-card-2)', border: '1px solid var(--border)' }}>
                  <div className="flex-1 min-w-0">
                    <div style={{ fontSize: '13px', color: 'var(--ink)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{f.name}</div>
                    <div style={{ fontSize: '10px', color: 'var(--ink-faint)' }}>Currently {f.rep > 0 ? '+' : ''}{f.rep}</div>
                  </div>
                  <input
                    type="number"
                    placeholder="±0"
                    value={repChanges[f.id] ?? ''}
                    onChange={e => setDelta(f.id, e.target.value)}
                    style={{ width: '70px', textAlign: 'center' }}
                  />
                </div>
              ))}
            </div>
            <div style={{ fontSize: '10px', color: 'var(--ink-faint)', marginTop: '6px', fontStyle: 'italic' }}>
              Range: −100 to +100. Values will be clamped if they push past the cap.
            </div>
          </div>
        </div>

        <div className="flex justify-end gap-2 mt-5">
          <SmallBtn variant="dim" onClick={onCancel}>Cancel</SmallBtn>
          <SmallBtn variant="accent" onClick={handleResolve}>
            Resolve {totalAffected > 0 && `(${totalAffected} faction${totalAffected !== 1 ? 's' : ''})`}
          </SmallBtn>
        </div>
      </div>
    </div>
  );
}

// === GOALS TAB ===

function GoalsTab({ goals, factions, rumors, currentDay, shortcutPenaltyForFaction, onAddGoal, onUpdateGoal, onDeleteGoal, onAdvanceGoal, onRollGoal, onRumorPrompt, onAddRumor, onUpdateRumor, onDeleteRumor, onOfferAsJob }) {
  const [creating, setCreating] = useState(false);
  const [filterFaction, setFilterFaction] = useState('');
  const [showResolved, setShowResolved] = useState(false);

  const visible = goals.filter(g => {
    if (filterFaction && g.factionId !== filterFaction) return false;
    if (!showResolved && g.status === 'resolved') return false;
    return true;
  });

  const seasonal = visible.filter(g => g.term === 'seasonal' && g.status !== 'resolved');
  const resolved = visible.filter(g => g.status === 'resolved');

  const pendingRumors = rumors.filter(r => !r.delivered);
  const deliveredRumors = rumors.filter(r => r.delivered);

  return (
    <div className="py-6 space-y-5">
      <div className="flex items-center justify-between gap-3 flex-wrap">
        <SectionHeader>Faction Goals</SectionHeader>
        {!creating && <SmallBtn variant="accent" onClick={() => setCreating(true)}>+ New Goal</SmallBtn>}
      </div>

      <div style={{ fontSize: '12px', color: 'var(--ink-dim)', lineHeight: 1.5 }}>
        Track what each faction is trying to accomplish this season. Goals progress from 0 to 100. Player jobs advance or set them back. Every 7 in-game days, factions roll a d100 bucket to make their own progress. Long-term goals live on each faction's card in the Factions tab.
      </div>

      {creating && (
        <GoalForm
          mode="create"
          goal={{ term: 'seasonal' }}
          factions={factions}
          existingGoals={goals}
          lockTerm={true}
          onSave={(goal) => { onAddGoal(goal); setCreating(false); }}
          onCancel={() => setCreating(false)}
        />
      )}

      {/* Filters */}
      {goals.length > 0 && (
        <div className="flex flex-wrap gap-3 items-center" style={{ background: 'var(--bg-card-2)', padding: '10px 12px', border: '1px solid var(--border)' }}>
          <Field label="Filter by faction">
            <select value={filterFaction} onChange={e => setFilterFaction(e.target.value)}>
              <option value="">All factions</option>
              {sortFactions(factions).map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
            </select>
          </Field>
          <label className="flex items-center gap-2" style={{ fontSize: '11px', color: 'var(--ink-dim)', cursor: 'pointer', marginTop: '14px' }}>
            <input type="checkbox" checked={showResolved} onChange={e => setShowResolved(e.target.checked)} />
            Show resolved
          </label>
        </div>
      )}

      {/* Pending Rumors */}
      {pendingRumors.length > 0 && (
        <div style={{ background: 'var(--bg-card)', border: '1px solid var(--accent)', padding: '12px 14px' }}>
          <div className="flex items-center justify-between mb-2">
            <div style={{ fontFamily: 'var(--font-display)', fontSize: '14px', color: 'var(--accent)', letterSpacing: '0.1em' }}>
              PENDING RUMORS ({pendingRumors.length})
            </div>
          </div>
          <div className="space-y-2">
            {pendingRumors.map(r => (
              <RumorRow key={r.id} rumor={r} factions={factions} onUpdate={onUpdateRumor} onDelete={onDeleteRumor} />
            ))}
          </div>
        </div>
      )}

      {goals.length === 0 && !creating && (
        <div className="py-12 text-center" style={{ color: 'var(--ink-faint)', fontSize: '13px' }}>
          No goals yet. Add one above to start tracking faction ambitions.
        </div>
      )}

      {seasonal.length > 0 && (
        <section>
          <SubHeader>Seasonal Goals ({seasonal.length})</SubHeader>
          <div className="space-y-3 mt-2">
            {seasonal.map(g => (
              <GoalCard
                key={g.id}
                goal={g}
                factions={factions}
                goals={goals}
                shortcutPenalty={shortcutPenaltyForFaction(g.factionId)}
                onUpdate={onUpdateGoal}
                onDelete={onDeleteGoal}
                onAdvance={onAdvanceGoal}
                onRoll={onRollGoal}
                onRumorPrompt={onRumorPrompt}
                onOfferAsJob={onOfferAsJob}
              />
            ))}
          </div>
        </section>
      )}

      {showResolved && resolved.length > 0 && (
        <section>
          <SubHeader>Resolved ({resolved.length})</SubHeader>
          <div className="space-y-3 mt-2">
            {resolved.map(g => (
              <GoalCard
                key={g.id}
                goal={g}
                factions={factions}
                goals={goals}
                shortcutPenalty={0}
                onUpdate={onUpdateGoal}
                onDelete={onDeleteGoal}
                onAdvance={onAdvanceGoal}
                onRoll={onRollGoal}
                onRumorPrompt={onRumorPrompt}
              />
            ))}
          </div>
        </section>
      )}

      {/* Delivered rumors at the bottom */}
      {deliveredRumors.length > 0 && (
        <section>
          <SubHeader>Delivered Rumors ({deliveredRumors.length})</SubHeader>
          <div className="space-y-2 mt-2 opacity-60">
            {deliveredRumors.slice(0, 20).map(r => (
              <RumorRow key={r.id} rumor={r} factions={factions} onUpdate={onUpdateRumor} onDelete={onDeleteRumor} />
            ))}
          </div>
        </section>
      )}
    </div>
  );
}

function GoalForm({ mode, goal, factions, existingGoals, onSave, onCancel, lockFaction, lockTerm }) {
  const [title, setTitle] = useState(goal?.title || '');
  const [factionId, setFactionId] = useState(goal?.factionId || (factions[0]?.id || ''));
  const [term, setTerm] = useState(goal?.term || 'seasonal');
  const [description, setDescription] = useState(goal?.description || '');
  const [progress, setProgress] = useState(goal?.progress ?? 0);
  const [advancesGoalId, setAdvancesGoalId] = useState(goal?.advancesGoalId || '');
  const [conflictsWith, setConflictsWith] = useState(goal?.conflictsWith || []);
  const [alliedWith, setAlliedWith] = useState(goal?.alliedWith || []);
  const [usedShortcut, setUsedShortcut] = useState(goal?.usedShortcut || false);
  const [showSuggestions, setShowSuggestions] = useState(false);
  const [scopeFilter, setScopeFilter] = useState('all');
  const [includeQuestionable, setIncludeQuestionable] = useState(true);

  const longTermGoalsForFaction = (existingGoals || []).filter(g =>
    g.term === 'long' && g.factionId === factionId && g.status !== 'resolved' && (!goal || g.id !== goal.id)
  );

  const otherGoals = (existingGoals || []).filter(g =>
    g.status !== 'resolved' && (!goal || g.id !== goal.id)
  );

  // Enforcement: each faction has at most one active seasonal AND one active long-term goal
  const factionHasActiveSeasonal = (existingGoals || []).some(g =>
    g.factionId === factionId && g.term === 'seasonal' && g.status !== 'resolved' && (!goal || g.id !== goal.id)
  );
  const factionHasActiveLongTerm = (existingGoals || []).some(g =>
    g.factionId === factionId && g.term === 'long' && g.status !== 'resolved' && (!goal || g.id !== goal.id)
  );

  const limitViolated = (term === 'seasonal' && factionHasActiveSeasonal) ||
                        (term === 'long' && factionHasActiveLongTerm);

  const canSave = title.trim() && factionId && !limitViolated;

  const handleSave = () => {
    if (!canSave) return;
    onSave({
      ...(goal || {}),
      title: title.trim(),
      factionId,
      term,
      description: description.trim(),
      progress: parseInt(progress) || 0,
      advancesGoalId: advancesGoalId || null,
      conflictsWith,
      alliedWith,
      usedShortcut,
      status: goal?.status || 'active'
    });
  };

  const toggleConflict = (gid) => {
    setConflictsWith(prev => prev.includes(gid) ? prev.filter(x => x !== gid) : [...prev, gid]);
  };

  const toggleAllied = (factionId) => {
    setAlliedWith(prev => prev.includes(factionId) ? prev.filter(x => x !== factionId) : [...prev, factionId]);
  };

  const applySeed = (seed) => {
    setTitle(seed.title);
    setDescription(seed.description);
    setShowSuggestions(false);
  };

  const filteredSeeds = SEASONAL_GOAL_SEEDS.filter(s => {
    if (scopeFilter !== 'all' && s.scope !== scopeFilter) return false;
    if (!includeQuestionable && s.questionable) return false;
    return true;
  });

  const scopeColor = {
    small: 'var(--ink-dim)',
    medium: 'var(--ink)',
    large: 'var(--accent)'
  };
  const scopeLabel = {
    small: 'small',
    medium: 'medium',
    large: 'large'
  };

  return (
    <div style={{ background: 'var(--bg-card)', border: '1px dashed var(--accent)', padding: '14px' }} className="space-y-3">
      <div className="flex items-center justify-between gap-3">
        <div style={{ fontFamily: 'var(--font-display)', fontSize: '15px', color: 'var(--accent)' }}>
          {mode === 'create' ? 'New Goal' : 'Edit Goal'}
        </div>
        {mode === 'create' && term === 'seasonal' && (
          <SmallBtn variant="dim" onClick={() => setShowSuggestions(!showSuggestions)}>
            {showSuggestions ? 'Hide suggestions' : '✨ Use a suggestion'}
          </SmallBtn>
        )}
      </div>

      {showSuggestions && (
        <div style={{ background: 'var(--bg-card-2)', border: '1px solid var(--border)', padding: '10px 12px' }} className="space-y-2">
          <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', textTransform: 'uppercase' }}>
            Seasonal goal seeds — click one to fill the form
          </div>

          <div className="flex gap-2 flex-wrap items-center" style={{ fontSize: '11px' }}>
            <span style={{ color: 'var(--ink-faint)' }}>Scope:</span>
            {['all', 'small', 'medium', 'large'].map(s => (
              <button
                key={s}
                onClick={() => setScopeFilter(s)}
                style={{
                  background: scopeFilter === s ? 'var(--accent-dim)' : 'transparent',
                  border: '1px solid ' + (scopeFilter === s ? 'var(--accent)' : 'var(--border)'),
                  color: scopeFilter === s ? 'var(--ink)' : 'var(--ink-dim)',
                  padding: '2px 8px',
                  cursor: 'pointer',
                  fontFamily: 'var(--font-mono)',
                  fontSize: '10px',
                  letterSpacing: '0.1em',
                  textTransform: 'uppercase'
                }}
              >{s}</button>
            ))}
            <label className="flex items-center gap-1" style={{ color: 'var(--ink-dim)', cursor: 'pointer', marginLeft: '8px' }}>
              <input type="checkbox" checked={includeQuestionable} onChange={e => setIncludeQuestionable(e.target.checked)} />
              <span style={{ fontSize: '11px' }}>Include questionable</span>
            </label>
          </div>

          <div className="space-y-1 max-h-72 overflow-y-auto">
            {filteredSeeds.length === 0 && (
              <div style={{ fontSize: '11px', color: 'var(--ink-faint)', fontStyle: 'italic', padding: '8px 0' }}>
                No suggestions match those filters.
              </div>
            )}
            {filteredSeeds.map((s, i) => (
              <button
                key={i}
                onClick={() => applySeed(s)}
                style={{
                  width: '100%',
                  textAlign: 'left',
                  background: 'transparent',
                  border: '1px solid var(--border)',
                  padding: '8px 10px',
                  cursor: 'pointer',
                  fontFamily: 'var(--font-mono)'
                }}
                onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--accent)'}
                onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border)'}
              >
                <div className="flex items-center gap-2 flex-wrap">
                  <span style={{ fontSize: '12px', color: 'var(--ink)', fontWeight: 700 }}>{s.title}</span>
                  <span style={{ fontSize: '9px', color: scopeColor[s.scope], letterSpacing: '0.15em', textTransform: 'uppercase', border: '1px solid ' + scopeColor[s.scope], padding: '1px 5px' }}>
                    {scopeLabel[s.scope]}
                  </span>
                  {s.questionable && (
                    <span style={{ fontSize: '9px', color: 'var(--danger)', letterSpacing: '0.15em', textTransform: 'uppercase', border: '1px solid var(--danger)', padding: '1px 5px' }}>
                      questionable
                    </span>
                  )}
                </div>
                <div style={{ fontSize: '11px', color: 'var(--ink-dim)', marginTop: '3px', lineHeight: 1.4 }}>
                  {s.description}
                </div>
              </button>
            ))}
          </div>
        </div>
      )}

      <Field label="Title">
        <input className="w-full" value={title} onChange={e => setTitle(e.target.value)} placeholder="e.g. Secure the eastern trade route" />
      </Field>

      {(!lockFaction || !lockTerm) && (
        <div className="grid grid-cols-2 gap-3">
          {!lockFaction && (
            <Field label="Faction">
              <select className="w-full" value={factionId} onChange={e => setFactionId(e.target.value)}>
                <option value="">— Select —</option>
                {sortFactions(factions).map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
              </select>
            </Field>
          )}
          {!lockTerm && (
            <Field label="Term">
              <div className="flex gap-2">
                {['seasonal', 'long'].map(t => (
                  <button
                    key={t}
                    onClick={() => setTerm(t)}
                    style={{
                      flex: 1, padding: '6px 0',
                      background: term === t ? 'var(--accent-dim)' : 'transparent',
                      border: '1px solid ' + (term === t ? 'var(--accent)' : 'var(--border)'),
                      color: term === t ? 'var(--ink)' : 'var(--ink-dim)',
                      fontFamily: 'var(--font-mono)', fontSize: '11px',
                      letterSpacing: '0.1em', textTransform: 'uppercase', cursor: 'pointer'
                    }}
                  >
                    {t === 'long' ? 'Long-term' : 'Seasonal'}
                  </button>
                ))}
              </div>
            </Field>
          )}
        </div>
      )}

      <Field label="Description (optional)">
        <textarea className="w-full" rows={2} value={description} onChange={e => setDescription(e.target.value)} placeholder="What success looks like, what's at stake..." />
      </Field>

      <Field label="Starting progress (0–100)">
        <input className="w-full" type="number" min="0" max="100" value={progress} onChange={e => setProgress(e.target.value)} />
      </Field>

      {term === 'seasonal' && longTermGoalsForFaction.length > 0 && (
        <Field label="Advances which long-term goal? (optional)">
          <select className="w-full" value={advancesGoalId} onChange={e => setAdvancesGoalId(e.target.value)}>
            <option value="">— None —</option>
            {longTermGoalsForFaction.map(g => <option key={g.id} value={g.id}>{g.title}</option>)}
          </select>
        </Field>
      )}

      {factions.filter(f => f.id !== factionId).length > 0 && (
        <div>
          <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', marginBottom: '4px', textTransform: 'uppercase' }}>
            Conflicts with factions
          </div>
          <div style={{ fontSize: '10px', color: 'var(--ink-faint)', marginBottom: '4px', fontStyle: 'italic' }}>
            When this goal advances, the conflicting faction's seasonal goal takes a hit (half rounded down).
          </div>
          <div className="space-y-1 max-h-32 overflow-y-auto" style={{ background: 'var(--bg-card-2)', padding: '6px 8px', border: '1px solid var(--border)' }}>
            {sortFactions(factions.filter(f => f.id !== factionId)).map(f => (
              <label key={f.id} className="flex items-center gap-2" style={{ fontSize: '11px', color: 'var(--ink)', cursor: 'pointer' }}>
                <input type="checkbox" checked={conflictsWith.includes(f.id)} onChange={() => toggleConflict(f.id)} />
                {f.name}
              </label>
            ))}
          </div>
        </div>
      )}

      {factions.filter(f => f.id !== factionId).length > 0 && (
        <div>
          <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', marginBottom: '4px', textTransform: 'uppercase' }}>
            Allied with factions
          </div>
          <div style={{ fontSize: '10px', color: 'var(--ink-faint)', marginBottom: '4px', fontStyle: 'italic' }}>
            When this goal moves, allied factions' active seasonal goals also move half as much in the same direction.
          </div>
          <div className="space-y-1 max-h-32 overflow-y-auto" style={{ background: 'var(--bg-card-2)', padding: '6px 8px', border: '1px solid var(--border)' }}>
            {sortFactions(factions.filter(f => f.id !== factionId)).map(f => (
              <label key={f.id} className="flex items-center gap-2" style={{ fontSize: '11px', color: 'var(--ink)', cursor: 'pointer' }}>
                <input type="checkbox" checked={alliedWith.includes(f.id)} onChange={() => toggleAllied(f.id)} />
                {f.name}
              </label>
            ))}
          </div>
        </div>
      )}

      <label className="flex items-center gap-2" style={{ fontSize: '11px', color: 'var(--ink-dim)', cursor: 'pointer' }}>
        <input type="checkbox" checked={usedShortcut} onChange={e => setUsedShortcut(e.target.checked)} />
        Used a shortcut to advance this goal (applies −5 penalty to faction's future rolls)
      </label>

      <div className="flex justify-end gap-2 pt-2">
        <SmallBtn variant="dim" onClick={onCancel}>Cancel</SmallBtn>
        <SmallBtn variant="accent" onClick={handleSave}>{mode === 'create' ? 'Create' : 'Save'}</SmallBtn>
      </div>
      {!canSave && (
        <div style={{ fontSize: '10px', color: limitViolated ? 'var(--danger)' : 'var(--ink-faint)', textAlign: 'right' }}>
          {limitViolated
            ? `This faction already has an active ${term === 'seasonal' ? 'seasonal' : 'long-term'} goal. Resolve it first.`
            : 'Title and faction are required.'}
        </div>
      )}
    </div>
  );
}

function GoalCard({ goal, factions, goals, shortcutPenalty, onUpdate, onDelete, onAdvance, onRoll, onRumorPrompt, onOfferAsJob }) {
  const [expanded, setExpanded] = useState(false);
  const [editing, setEditing] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [bumpVal, setBumpVal] = useState('');
  const [bumpReason, setBumpReason] = useState('');

  const faction = factionById(factions, goal.factionId);
  const advancesGoal = goal.advancesGoalId ? goals.find(g => g.id === goal.advancesGoalId) : null;
  const conflictFactions = (goal.conflictsWith || []).map(fid => factionById(factions, fid)).filter(Boolean);
  const alliedFactions = (goal.alliedWith || []).map(fid => factionById(factions, fid)).filter(Boolean);

  const progressColor = goal.progress >= 90 ? 'var(--accent)' : goal.progress >= 60 ? 'var(--good)' : goal.progress >= 30 ? 'var(--ink)' : 'var(--ink-dim)';

  if (editing) {
    return (
      <GoalForm
        mode="edit"
        goal={goal}
        factions={factions}
        existingGoals={goals}
        onSave={(patch) => { onUpdate(goal.id, patch); setEditing(false); }}
        onCancel={() => setEditing(false)}
      />
    );
  }

  const applyBump = () => {
    const n = parseInt(bumpVal);
    if (isNaN(n) || n === 0) return;
    const result = onAdvance(goal.id, n, bumpReason || 'Manual adjustment', 'manual');
    setBumpVal('');
    setBumpReason('');
    // Prompt for rumor on big swings (≥10 absolute)
    if (Math.abs(n) >= 10) {
      onRumorPrompt(goal, n);
    }
  };

  const handleRoll = () => {
    const result = onRoll(goal.id);
    if (result && result.bucket && result.bucket.major) {
      onRumorPrompt(goal, result.bucket.delta);
    }
  };

  const markResolved = (status) => {
    onUpdate(goal.id, { status: 'resolved', resolvedOnDay: Date.now(), resolution: status });
    // Bump linked long-term goal if succeeded
    if (status === 'succeeded' && goal.advancesGoalId) {
      onAdvance(goal.advancesGoalId, 10, `Linked seasonal goal succeeded: ${goal.title}`, 'linked');
    }
  };

  return (
    <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', padding: '14px 16px' }}>
      <div className="flex items-start justify-between gap-3 flex-wrap">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span style={{ fontFamily: 'var(--font-display)', fontSize: '16px', color: 'var(--ink)' }}>{goal.title}</span>
            {goal.usedShortcut && (
              <span style={{ fontSize: '9px', padding: '2px 6px', border: '1px solid var(--danger)', color: 'var(--danger)', letterSpacing: '0.1em' }}>SHORTCUT</span>
            )}
            {goal.status === 'resolved' && (
              <span style={{ fontSize: '9px', padding: '2px 6px', border: '1px solid var(--ink-dim)', color: 'var(--ink-dim)', letterSpacing: '0.1em' }}>
                {(goal.resolution || 'RESOLVED').toUpperCase()}
              </span>
            )}
          </div>
          <div style={{ fontSize: '11px', color: 'var(--ink-dim)', marginTop: '2px' }}>
            <span style={{ color: 'var(--accent)' }}>{faction?.name || '?'}</span> · {goal.term === 'long' ? 'Long-term' : 'Seasonal'}
            {advancesGoal && <span> · advances <span style={{ color: 'var(--ink)' }}>{advancesGoal.title}</span></span>}
          </div>
        </div>
        <SmallBtn variant="dim" onClick={() => setExpanded(!expanded)}>{expanded ? '−' : '+'}</SmallBtn>
      </div>

      {/* Progress bar */}
      <div className="mt-3" style={{ background: 'var(--bg-card-2)', border: '1px solid var(--border)', height: '20px', position: 'relative', overflow: 'hidden' }}>
        <div style={{
          width: `${goal.progress}%`,
          height: '100%',
          background: progressColor,
          opacity: 0.3,
          transition: 'width 0.3s'
        }} />
        <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '11px', color: 'var(--ink)', fontWeight: 700, letterSpacing: '0.1em' }}>
          {goal.progress} / 100
        </div>
      </div>

      {expanded && (
        <div className="mt-4 space-y-3" style={{ borderTop: '1px solid var(--border)', paddingTop: '12px' }}>
          {goal.description && (
            <div style={{ fontSize: '12px', color: 'var(--ink-dim)', whiteSpace: 'pre-wrap', lineHeight: 1.4 }}>
              {goal.description}
            </div>
          )}

          {conflictFactions.length > 0 && (
            <div>
              <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', marginBottom: '4px', textTransform: 'uppercase' }}>Conflicts with factions</div>
              <div className="flex flex-wrap gap-2">
                {conflictFactions.map(f => (
                  <span key={f.id} style={{ fontSize: '11px', color: 'var(--ink)', padding: '2px 8px', border: '1px solid var(--danger)', borderLeft: '3px solid var(--danger)' }}>
                    {f.name}
                  </span>
                ))}
              </div>
            </div>
          )}

          {alliedFactions.length > 0 && (
            <div>
              <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', marginBottom: '4px', textTransform: 'uppercase' }}>Allied with factions</div>
              <div className="flex flex-wrap gap-2">
                {alliedFactions.map(f => (
                  <span key={f.id} style={{ fontSize: '11px', color: 'var(--ink)', padding: '2px 8px', border: '1px solid var(--good)', borderLeft: '3px solid var(--good)' }}>
                    {f.name}
                  </span>
                ))}
              </div>
            </div>
          )}

          {goal.status !== 'resolved' && (
            <>
              <div style={{ background: 'var(--bg-card-2)', padding: '10px', border: '1px solid var(--border)' }}>

                <div style={{ background: 'var(--bg-card-2)', padding: '10px', border: '1px solid var(--border)' }}>

                    {shortcutPenalty < 0 && (
                      <span style={{ fontSize: '10px', color: 'var(--danger)' }}>Shortcut penalty: {shortcutPenalty}</span>
                    )}

                  </div>
                </div>

                  <div style={{ fontSize: '11px', color: 'var(--ink-dim)', lineHeight: 1.5 }}>
                    Long-term goals don't roll buckets. Progress comes from linked seasonal goals succeeding (+10 each). Manual adjustments above are for story events outside the tracker.
                  </div>
                </div>
              )}
            </>
          )}

          {/* Progress history */}
          {goal.progressLog && goal.progressLog.length > 0 && (
            <div>
              <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', marginBottom: '4px', textTransform: 'uppercase' }}>

                  <div key={i} className="flex justify-between gap-3" style={{ fontSize: '11px', color: 'var(--ink-dim)', padding: '2px 0', borderBottom: '1px dotted var(--border)' }}>

                      <span style={{ color: 'var(--ink-faint)' }}>D{h.day}:</span> {h.reason}
                    </span>
                    <span style={{ color: h.change > 0 ? 'var(--good)' : h.change < 0 ? 'var(--danger)' : 'var(--ink-dim)', fontWeight: 700 }}>
                      {h.change > 0 ? '+' : ''}{h.change}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="flex justify-end gap-2 pt-2 flex-wrap">
            {goal.status !== 'resolved' && (
              <>
                <SmallBtn variant="dim" onClick={() => setEditing(true)}>Edit</SmallBtn>
                {goal.term === 'seasonal' && onOfferAsJob && (
                  <SmallBtn variant="accent" onClick={() => onOfferAsJob(goal)}>Offer as Job →</SmallBtn>
                )}

                <SmallBtn variant="accent" onClick={() => markResolved('succeeded')}>Mark Succeeded</SmallBtn>
              </>
            )}
            {!confirmDelete ? (
              <SmallBtn variant="danger" onClick={() => setConfirmDelete(true)}>Delete</SmallBtn>
            ) : (
              <>
                <SmallBtn variant="dim" onClick={() => setConfirmDelete(false)}>Cancel</SmallBtn>
                <SmallBtn variant="danger" onClick={() => onDelete(goal.id)}>Confirm delete</SmallBtn>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function CreateGoalJobModal({ goal, faction, onCreate, onCancel }) {
  const [tier, setTier] = useState(2);

  const [loot, setLoot] = useState([]);

  // Tier-based goal impact per outcome (computed at display + save time)
  const computeGoalImpactByOutcome = (t) => {
    // Roughly aligned with GOAL_IMPACT_HINTS midpoints scaled per outcome
    // Tier base: 1: 4, 2: 5, 3: 8, 4: 15, 5: 22
    const base = { 1: 4, 2: 5, 3: 8, 4: 15, 5: 22 }[t] || 5;
    return {
      clean: base,
      messy: Math.max(1, Math.round(base * 0.6)),
      failed: -Math.max(1, Math.round(base * 0.5)),
      abandoned: -Math.max(2, Math.round(base * 0.8))
    };
  };

  const goalImpact = computeGoalImpactByOutcome(tier);
  const repByOutcome = {
    clean: repChangeFor(tier, 'clean'),
    messy: repChangeFor(tier, 'messy'),
    failed: repChangeFor(tier, 'failed'),

        <div style={{ fontSize: '11px', color: 'var(--ink-dim)', marginBottom: '16px' }}>

        <div className="space-y-3">
          <Field label="Tier">
            <div className="flex gap-1">
              {[1,2,3,4,5].map(t => (
                <button
                  key={t}
