// Bucket system: roll d100, modifier, look up bucket
const BUCKETS = [
  { min: 1, max: 16, label: 'Major failure', delta: -10, color: 'var(--danger)', major: true },
  { min: 17, max: 33, label: 'Minor setback', delta: -5, color: 'var(--danger)', major: false },
  { min: 34, max: 50, label: 'Stalled', delta: 0, color: 'var(--ink-dim)', major: false },
  { min: 51, max: 67, label: 'Small win', delta: 10, color: 'var(--good)', major: false },
  { min: 68, max: 83, label: 'Medium win', delta: 15, color: 'var(--good)', major: false },
  { min: 84, max: 100, label: 'Major win', delta: 25, color: 'var(--accent)', major: true }
];

const bucketFor = (rollResult) => {
  // Clamp to 1-100 for bucket lookup; allow modifiers to push outside range conceptually
  const r = Math.max(1, Math.min(100, rollResult));
  return BUCKETS.find(b => r >= b.min && r <= b.max);
};

// Seasons
const SEASONS = ['Spring', 'Summer', 'Autumn', 'Winter'];
const DAYS_PER_SEASON = 15;
const DAYS_PER_FACTION_TURN = 7;

// Compute season + year + season-day from a single absolute day counter (Day 1 = Spring Y1)
const dayBreakdown = (absDay) => {
  const d = Math.max(1, absDay);
  const totalSeasonsElapsed = Math.floor((d - 1) / DAYS_PER_SEASON);
  const yearIndex = Math.floor(totalSeasonsElapsed / 4); // 0-indexed
  const seasonIndex = totalSeasonsElapsed % 4;
  const dayInSeason = ((d - 1) % DAYS_PER_SEASON) + 1;
  return {
    year: yearIndex + 1,
    season: SEASONS[seasonIndex],
    seasonIndex,
    dayInSeason,
    absDay: d
  };
};

const formatDay = (absDay) => {
  const b = dayBreakdown(absDay);
  return `Day ${b.dayInSeason}, ${b.season} ${b.year} ATE`;
};

// Alphabetize a faction list for display. Source-of-truth array stays insertion-order.
const sortFactions = (list) => {
  return [...(list || [])].sort((a, b) => (a.name || '').localeCompare(b.name || ''));
};

// Inverse: given year (1+), seasonIndex (0-3), dayInSeason (1-105), compute absolute day
const composeAbsDay = (year, seasonIndex, dayInSeason) => {
  const y = Math.max(1, parseInt(year) || 1);
  const s = Math.max(0, Math.min(3, parseInt(seasonIndex) || 0));
  const d = Math.max(1, Math.min(DAYS_PER_SEASON, parseInt(dayInSeason) || 1));
  return ((y - 1) * 4 + s) * DAYS_PER_SEASON + d;
};

// Get the absolute day for the start of the next season after `absDay`
const startOfNextSeason = (absDay) => {
  const b = dayBreakdown(absDay);
  const daysLeft = DAYS_PER_SEASON - b.dayInSeason + 1;
  return absDay + daysLeft;
};

      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
      console.error('Save failed:', e);
    }
  }, [factions, activeJobs, history, library, storyMissions, goals, rumors, players, partyResources, stNotes, currentDay, lastFactionTurnDay, loaded]);

  const addJob = (job) => {
    setActiveJobs(prev => [{ ...job, id: makeId(), createdAt: Date.now(), status: job.status || 'offered' }, ...prev]);
  };

  const updateJob = (id, patch) => {
    setActiveJobs(prev => prev.map(j => j.id === id ? { ...j, ...patch } : j));
  };

  const deleteJob = (id) => {
    setActiveJobs(prev => prev.filter(j => j.id !== id));
  };

  const resolveJob = (job, outcome, sideEffectsOverride, goalEffectsOverride) => {
    const repDelta = repChangeFor(job.tier, outcome);
    const reason = `${outcome === 'clean' ? 'Completed' : outcome === 'messy' ? 'Messy success on' : outcome === 'failed' ? 'Failed' : 'Abandoned'}: ${job.missionType}${job.title ? ' — ' + job.title : ''}`;

    const sideEffects = sideEffectsOverride !== undefined ? sideEffectsOverride : (job.sideEffects || {});
    const goalEffects = goalEffectsOverride !== undefined ? goalEffectsOverride : (job.goalEffects || {});

    const allChanges = {};
    if (job.factionId && repDelta !== 0) {
      allChanges[job.factionId] = repDelta;
    }
    for (const [fid, val] of Object.entries(sideEffects)) {
      const n = parseInt(val);
      if (isNaN(n) || n === 0) continue;
      allChanges[fid] = (allChanges[fid] || 0) + n;
    }

    const appliedDeltas = {};

    setFactions(prev => prev.map(f => {
      const delta = allChanges[f.id];
      if (!delta || delta === 0) return f;
      const newRep = clampRep(f.rep + delta);
      const actual = newRep - f.rep;
      if (actual === 0) return f;
      appliedDeltas[f.id] = actual;
      return {
        ...f,
        rep: newRep,
        history: [{ at: Date.now(), change: actual, reason }, ...f.history]
      };
    }));

    // Apply goal effects
    const goalDeltasApplied = {};
    if (Object.keys(goalEffects).length > 0) {
      setGoals(prev => prev.map(g => {
        const val = goalEffects[g.id];
        if (val === undefined || val === '' || val === 0) return g;
        const n = parseInt(val);
        if (isNaN(n) || n === 0) return g;
        const newProgress = clampProgress(g.progress + n);
        const actual = newProgress - g.progress;
        if (actual === 0) return g;
        goalDeltasApplied[g.id] = actual;
        const goalReason = `Player job: ${job.title || job.missionType}`;
        return {
          ...g,
          progress: newProgress,
          progressLog: [
            { at: Date.now(), day: currentDay, change: actual, reason: goalReason, source: 'job', jobId: job.id },
            ...g.progressLog
          ]
        };
      }));
    }

    const primaryApplied = appliedDeltas[job.factionId] || 0;
    const sideApplied = { ...appliedDeltas };
    if (job.factionId) delete sideApplied[job.factionId];

    const resolved = {
      ...job,
      status: outcome,
      resolvedAt: Date.now(),
      resolvedOnDay: currentDay,
      repDelta: primaryApplied,
      sideEffectsApplied: sideApplied,
      goalEffectsApplied: goalDeltasApplied
    };
    setHistory(prev => [resolved, ...prev]);
    setActiveJobs(prev => prev.filter(j => j.id !== job.id));
    setResolvingJob(null);

    if (outcome !== 'abandoned' && CHAIN_SUGGESTIONS[job.missionType]) {
      const suggestions = CHAIN_SUGGESTIONS[job.missionType][outcome] || [];
      if (suggestions.length > 0) {
        setChainPrompt({ parent: job, outcome, suggestions });
      }
    }
  };

  const adjustRep = (factionId, delta, reason) => {
    setFactions(prev => prev.map(f => {
      if (f.id !== factionId) return f;
      const newRep = clampRep(f.rep + delta);
      const actual = newRep - f.rep;
      if (actual === 0) return f;
      return {
        ...f,
        rep: newRep,
        history: [{ at: Date.now(), change: actual, reason: reason || 'Manual adjustment' }, ...f.history]
      };
    }));
  };

  const setRep = (factionId, value, reason) => {
    setFactions(prev => prev.map(f => {
      if (f.id !== factionId) return f;
      const newRep = clampRep(value);
      const delta = newRep - f.rep;
      return {
        ...f,
        rep: newRep,
        history: [{ at: Date.now(), change: delta, reason: reason || 'Set value' }, ...f.history]
      };
    }));
  };

  const clearFactionHistory = (factionId) => {
    setFactions(prev => prev.map(f => f.id === factionId ? { ...f, history: [] } : f));
  };

  const deleteHistoryItem = (id) => {
    setHistory(prev => prev.filter(j => j.id !== id));
  };

  const clearAllHistory = () => {
    setHistory([]);
  };

  // === Library handlers ===

  const updateMissionType = (tier, originalType, patch) => {
    setLibrary(prev => {
      const next = { ...prev };
      next[tier] = next[tier].map(m => m.type === originalType ? { ...m, ...patch } : m);
      return next;
    });
  };

  const addMissionType = (tier, mission) => {
    setLibrary(prev => {
      const next = { ...prev };
      next[tier] = [...(next[tier] || []), mission];
      return next;
    });
  };

  const deleteMissionType = (tier, type) => {
    setLibrary(prev => {
      const next = { ...prev };
      next[tier] = next[tier].filter(m => m.type !== type);
      return next;
    });
  };

  const resetLibrary = () => {
    setLibrary(DEFAULT_LIBRARY);
  };

  // === Story mission handlers ===

  const addStoryMission = (mission) => {
    setStoryMissions(prev => [
      { ...mission, id: makeId(), createdAt: Date.now(), status: mission.status || 'planned' },
      ...prev
    ]);
  };

  const updateStoryMission = (id, patch) => {
    setStoryMissions(prev => prev.map(m => m.id === id ? { ...m, ...patch } : m));
  };

  const deleteStoryMission = (id) => {
    setStoryMissions(prev => prev.filter(m => m.id !== id));
  };

  const resolveStoryMission = (mission, repChanges, outcomeNote) => {
    // repChanges is { factionId: number, ... } — apply each, clamped, log to faction history
    const reason = `Story: ${mission.title}${outcomeNote ? ' — ' + outcomeNote : ''}`;
    const appliedDeltas = {};

    setFactions(prev => prev.map(f => {
      const delta = repChanges[f.id];
      if (!delta || delta === 0) return f;
      const newRep = clampRep(f.rep + delta);
      const actual = newRep - f.rep;
      if (actual === 0) return f;
      appliedDeltas[f.id] = actual;
      return {
        ...f,
        rep: newRep,
        history: [{ at: Date.now(), change: actual, reason }, ...f.history]
      };
    }));

    setStoryMissions(prev => prev.map(m =>
      m.id === mission.id
        ? { ...m, status: 'resolved', resolvedAt: Date.now(), outcomeNote, repChanges: appliedDeltas }
        : m
    ));
    setResolvingStory(null);
  };

  const addFaction = (name, rep, notes) => {
    setFactions(prev => [...prev, { id: makeId(), name, rep: rep || 0, notes: notes || '', history: [] }]);
  };

  const updateFaction = (id, patch) => {
    setFactions(prev => prev.map(f => f.id === id ? { ...f, ...patch } : f));
  };

  const deleteFaction = (id) => {
    setFactions(prev => prev.filter(f => f.id !== id));
  };

  // === Goals ===

  const addGoal = (goal) => {
    setGoals(prev => [
      {
        id: makeId(),
        createdAt: Date.now(),
        createdOnDay: currentDay,
        progress: 0,
        progressLog: [],
        usedShortcut: false,
        ...goal
      },
      ...prev
    ]);
  };

  const updateGoal = (id, patch) => {
    setGoals(prev => prev.map(g => g.id === id ? { ...g, ...patch } : g));
  };

  const deleteGoal = (id) => {
    setGoals(prev => prev.filter(g => g.id !== id));
  };

  // Apply a progress change to a goal (positive or negative). Logs the change.
  // Returns the bucket info for major-event detection.
  const advanceGoal = (goalId, delta, reason, source) => {
    let newProgress = null;
    let oldProgress = null;
    let actualChange = 0;
    let movingGoal = null;

    setGoals(prev => {
      // First pass: apply the primary change
      const next = prev.map(g => {
        if (g.id !== goalId) return g;
        oldProgress = g.progress;
        newProgress = clampProgress(g.progress + delta);
        actualChange = newProgress - g.progress;
        movingGoal = g;
        return {
          ...g,
          progress: newProgress,
          progressLog: [
            { at: Date.now(), day: currentDay, change: actualChange, reason: reason || 'Manual', source: source || 'manual' },
            ...g.progressLog
          ]
        };
      });

      if (!movingGoal || actualChange === 0) return next;

      // Skip cascading if this is itself a cascade (avoid loops) or a rollover bump
      if (source === 'conflict' || source === 'alliance' || source === 'rollover' || source === 'linked') {
        return next;
      }

      // === Apply conflict reduction ===
      // If movingGoal advances (positive change) and conflicts with factions,
      // each conflicting faction's active seasonal goal gets -half-rounded-down.
      // Conflict only triggers on positive changes (goal "winning"), not on losses.
      const conflictFactionIds = movingGoal.conflictsWith || [];
      const conflictDelta = actualChange > 0 ? -Math.floor(actualChange / 2) : 0;

      let result = next;
      if (conflictDelta !== 0 && conflictFactionIds.length > 0) {
        result = result.map(g => {
          if (g.id === goalId) return g; // don't hit self
          if (g.term !== 'seasonal' || g.status === 'resolved') return g;
          if (!conflictFactionIds.includes(g.factionId)) return g;

          const newProg = clampProgress(g.progress + conflictDelta);
          const actual = newProg - g.progress;
          if (actual === 0) return g;

          return {
            ...g,
            progress: newProg,
            progressLog: [
              { at: Date.now(), day: currentDay, change: actual, reason: `Conflict: ${movingGoal.title} advanced`, source: 'conflict' },
              ...g.progressLog
            ]
          };
        });
      }

      // === Apply alliance bump ===
      // alliedWith is now a list of faction IDs. Allied factions' active seasonal goals get half the change (same direction).
      const alliedFactionIds = movingGoal.alliedWith || [];
      const allianceDelta = Math.trunc(actualChange / 2);

      if (allianceDelta !== 0 && alliedFactionIds.length > 0) {
        result = result.map(g => {
          if (g.id === goalId) return g;
          if (g.term !== 'seasonal' || g.status === 'resolved') return g;
          if (!alliedFactionIds.includes(g.factionId)) return g;

          const newProg = clampProgress(g.progress + allianceDelta);
          const actual = newProg - g.progress;
          if (actual === 0) return g;

          return {
            ...g,
            progress: newProg,
            progressLog: [
              { at: Date.now(), day: currentDay, change: actual, reason: `Allied with: ${movingGoal.title}`, source: 'alliance' },
              ...g.progressLog
            ]
          };
        });
      }

      return result;
    });

    return { oldProgress, newProgress };
  };

  // Count current shortcut penalty for a faction (sum of recent shortcuts)
  const shortcutPenaltyForFaction = (factionId) => {
    // -5 per goal completed via shortcut for this faction in current/recent state
    // For simplicity: count goals marked usedShortcut that are still active or recently resolved
    const now = currentDay;
    const recentShortcuts = goals.filter(g =>
      g.factionId === factionId &&
      g.usedShortcut &&
      // Active OR resolved within last 2 seasons (210 days)
      (g.status !== 'resolved' || (g.resolvedOnDay && now - g.resolvedOnDay < 210))
    );
    return recentShortcuts.length * -5;
  };

  // Roll a single goal's bucket and apply the resulting delta
  const rollGoalBucket = (goalId, includePenalty = true) => {
    const goal = goals.find(g => g.id === goalId);
    if (!goal) return null;

    const baseRoll = Math.floor(Math.random() * 100) + 1;
    const penalty = includePenalty ? shortcutPenaltyForFaction(goal.factionId) : 0;
    const finalRoll = Math.max(1, Math.min(100, baseRoll + penalty));
    const bucket = bucketFor(finalRoll);

    const reason = `Faction turn (rolled ${baseRoll}${penalty !== 0 ? (penalty > 0 ? ' +' + penalty : ' ' + penalty) : ''} = ${finalRoll}, ${bucket.label})`;
    const result = advanceGoal(goalId, bucket.delta, reason, 'roll');

    return { goal, baseRoll, penalty, finalRoll, bucket, ...result };
  };

  // Run the faction turn — roll every active seasonal goal (long-term goals don't roll)
  const runFactionTurn = () => {
    const active = goals.filter(g => g.status !== 'resolved' && g.term === 'seasonal');
    const rollResults = [];
    for (const g of active) {
      // Use current goals state at time of each roll — but since setGoals is batched,
      // we do them serially via a synchronous approach: roll each, accumulate, apply via setGoals once
      const baseRoll = Math.floor(Math.random() * 100) + 1;
      const penalty = shortcutPenaltyForFaction(g.factionId);
      const finalRoll = Math.max(1, Math.min(100, baseRoll + penalty));
      const bucket = bucketFor(finalRoll);
      rollResults.push({ goal: g, baseRoll, penalty, finalRoll, bucket });
    }

    // Apply all changes in one setGoals call
    setGoals(prev => prev.map(g => {
      const r = rollResults.find(x => x.goal.id === g.id);
      if (!r) return g;
      const newProgress = clampProgress(g.progress + r.bucket.delta);
      const actual = newProgress - g.progress;
      const reasonText = `Faction turn (rolled ${r.baseRoll}${r.penalty !== 0 ? (r.penalty > 0 ? ' +' + r.penalty : ' ' + r.penalty) : ''} = ${r.finalRoll}, ${r.bucket.label})`;
      return {
        ...g,
        progress: newProgress,
        progressLog: [
          { at: Date.now(), day: currentDay, change: actual, reason: reasonText, source: 'roll', bucket: r.bucket.label, finalRoll: r.finalRoll },
          ...g.progressLog
        ]
      };
    }));

    setLastFactionTurnDay(currentDay);
    setFactionTurnPrompt({ results: rollResults, day: currentDay });
  };

  // === Rumors ===

  const addRumor = (text, sourceType, sourceId, factionId) => {
    if (!text || !text.trim()) return;
    setRumors(prev => [
      {
        id: makeId(),
        createdAt: Date.now(),
        createdOnDay: currentDay,
        text: text.trim(),
        sourceType: sourceType || 'manual',
        sourceId: sourceId || null,
        factionId: factionId || null,
        delivered: false
      },
      ...prev
    ]);
  };

  const updateRumor = (id, patch) => {
    setRumors(prev => prev.map(r => r.id === id ? { ...r, ...patch } : r));
  };

  const deleteRumor = (id) => {
    setRumors(prev => prev.filter(r => r.id !== id));
  };

  // === Players ===

  const addPlayer = (data) => {
    setPlayers(prev => [...prev, {
      id: makeId(),
      name: data.name || 'New Character',
      playerName: data.playerName || '',
      madnessType: data.madnessType || '',
      madnessLevel: data.madnessLevel || 1,
      willpower: data.willpower ?? 10,
      hp: data.hp ?? 10,
      movement: data.movement || '',
      hit: data.hit || '',
      damage: data.damage || '',
      dodge: data.dodge || '',
      bonus: data.bonus || '',
      difficultyChecks: data.difficultyChecks || [false, false, false, false, false, false, false],
      equipment: data.equipment || [],
      notes: data.notes || '',
      createdAt: Date.now()
    }]);
  };

  const updatePlayer = (id, patch) => {
    setPlayers(prev => prev.map(p => p.id === id ? { ...p, ...patch } : p));
  };

  const deletePlayer = (id) => {
    setPlayers(prev => prev.filter(p => p.id !== id));
  };

  // === Party resources ===

  const adjustResource = (key, delta) => {
    setPartyResources(prev => ({
      ...prev,
      [key]: Math.max(0, (prev[key] || 0) + delta)
    }));
  };

  const setResource = (key, val) => {
    setPartyResources(prev => ({
      ...prev,
      [key]: Math.max(0, parseInt(val) || 0)
    }));
  };

  // === Day counter ===

  const advanceDay = (n = 1) => {
    if (n <= 0) { setCurrentDay(prev => prev + n); return; }
    setCurrentDay(prev => prev + n);
    // Decrement daysRemaining on every active/offered job (don't go below 0)
    setActiveJobs(prev => prev.map(j => ({
      ...j,
      daysRemaining: Math.max(0, (j.daysRemaining || 0) - n)
    })));
  };

  const setDay = (newDay) => {
    const target = Math.max(1, newDay);
    const diff = target - currentDay;
    setCurrentDay(target);
    if (diff > 0) {
      setActiveJobs(prev => prev.map(j => ({
        ...j,
        daysRemaining: Math.max(0, (j.daysRemaining || 0) - diff)
      })));
    }
    // If diff <= 0 (going backwards or same day), don't auto-restore — user can edit job days manually
  };

  // Days since last faction turn
  const daysSinceFactionTurn = currentDay - lastFactionTurnDay;
  const factionTurnReady = daysSinceFactionTurn >= DAYS_PER_FACTION_TURN && goals.filter(g => g.status !== 'resolved' && g.term === 'seasonal').length > 0;

  // === Seasonal rollover ===
  // Walks you through each seasonal goal at end of season.
  // Resolution per goal: 'succeeded' | 'carried' | 'failed'
  const applySeasonalRollover = (resolutions, seededGoals) => {
    // resolutions: { goalId: 'succeeded' | 'carried' | 'failed' }
    // seededGoals: array of new seasonal goals to add for next season
    const succeededLinks = []; // { advancesGoalId, sourceTitle }

    setGoals(prev => prev.map(g => {
      const decision = resolutions[g.id];
      if (!decision || decision === 'carried') return g;

      if (decision === 'succeeded' && g.advancesGoalId) {
        succeededLinks.push({ advancesGoalId: g.advancesGoalId, sourceTitle: g.title });
      }

      return {
        ...g,
        status: 'resolved',
        resolvedOnDay: currentDay,
        resolution: decision,
        progressLog: [
          { at: Date.now(), day: currentDay, change: 0, reason: `Seasonal rollover: ${decision}`, source: 'rollover' },
          ...g.progressLog
        ]
      };
    }));

    // Apply linked long-term bumps in a second pass
    if (succeededLinks.length > 0) {
      setGoals(prev => prev.map(g => {
        const links = succeededLinks.filter(l => l.advancesGoalId === g.id);
        if (links.length === 0) return g;
        let newProg = g.progress;
        const newEntries = [];
        for (const link of links) {
          const n = clampProgress(newProg + 10) - newProg;
          if (n !== 0) {
            newProg += n;
            newEntries.push({
              at: Date.now(),
              day: currentDay,
              change: n,
              reason: `Linked seasonal goal succeeded: ${link.sourceTitle}`,
              source: 'linked'
            });
          }
        }
        return {
          ...g,
          progress: newProg,
          progressLog: [...newEntries, ...g.progressLog]
        };
      }));
    }

    // Add any seeded new seasonal goals
    if (Array.isArray(seededGoals) && seededGoals.length > 0) {
      setGoals(prev => [
        ...seededGoals.map(seed => ({
          id: makeId(),
          createdAt: Date.now(),
          createdOnDay: currentDay,
          progressLog: [],
          usedShortcut: false,
          ...seed
        })),
        ...prev
      ]);
    }
  };


  if (!loaded) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: 'var(--bg)' }}>
        <div style={{ color: 'var(--ink-dim)', fontFamily: 'var(--font-mono)' }}>Loading...</div>
      </div>
    );
  }

  return (
    <div className="min-h-screen" style={{ background: 'var(--bg)', color: 'var(--ink)', fontFamily: 'var(--font-mono)' }}>
      <FontStyles />
      <Header
        tab={tab}
        setTab={setTab}
        activeCount={activeJobs.length}
        currentDay={currentDay}
        factionTurnReady={factionTurnReady}
        pendingRumorsCount={rumors.filter(r => !r.delivered).length}
        onAdvanceDay={advanceDay}
        onSetDay={setDay}
        onRunFactionTurn={runFactionTurn}
        onRolloverStart={() => {
          const seasonalActive = goals.filter(g => g.term === 'seasonal' && g.status !== 'resolved');
          setRolloverPrompt({ goals: seasonalActive });
        }}
      />
      <main className="max-w-6xl mx-auto px-4 pb-24">
        {tab === 'active' && (
          <ActiveJobsTab
            jobs={activeJobs}
            factions={factions}
            goals={goals}
            pendingRumors={rumors.filter(r => !r.delivered)}
            onUpdate={updateJob}
            onDelete={deleteJob}
            onResolveStart={setResolvingJob}
            onGoToGoals={() => setTab('goals')}
          />
        )}
        {tab === 'story' && (
          <StoryTab
            missions={storyMissions}
            factions={factions}
            onAdd={addStoryMission}
            onUpdate={updateStoryMission}
            onDelete={deleteStoryMission}
            onResolveStart={setResolvingStory}
          />
        )}
        {tab === 'goals' && (
          <GoalsTab
            goals={goals}
            factions={factions}
            rumors={rumors}
            currentDay={currentDay}
            shortcutPenaltyForFaction={shortcutPenaltyForFaction}
            onAddGoal={addGoal}
            onUpdateGoal={updateGoal}
            onDeleteGoal={deleteGoal}
            onAdvanceGoal={advanceGoal}
            onRollGoal={rollGoalBucket}
            onRumorPrompt={(goal, lastChange) => setRumorPromptForGoal({ goal, lastChange })}
            onAddRumor={addRumor}
            onUpdateRumor={updateRumor}
            onDeleteRumor={deleteRumor}
            onOfferAsJob={setCreateGoalJobFor}
          />
        )}
        {tab === 'generate' && (
          <GenerateTab
            factions={factions}
            library={library}
            goals={goals}
            onCreate={addJob}
          />
        )}
        {tab === 'factions' && (
          <FactionsTab
            factions={factions}
            goals={goals}
            onAdd={addFaction}
            onUpdate={updateFaction}
            onDelete={deleteFaction}
            onAdjust={adjustRep}
            onSet={setRep}
            onClearHistory={clearFactionHistory}
            onAddGoal={addGoal}
            onUpdateGoal={updateGoal}
            onDeleteGoal={deleteGoal}
            onAdvanceGoal={advanceGoal}
          />
        )}
        {tab === 'library' && (
          <LibraryTab
            library={library}
            onUpdate={updateMissionType}
            onAdd={addMissionType}
            onDelete={deleteMissionType}
            onReset={resetLibrary}
          />
        )}
        {tab === 'history' && (
          <HistoryTab history={history} factions={factions} onDelete={deleteHistoryItem} onClearAll={clearAllHistory} />
        )}
        {tab === 'players' && (
          <PlayersTab players={players} onAdd={addPlayer} onUpdate={updatePlayer} onDelete={deletePlayer} />
        )}
        {tab === 'resources' && (
          <PartyResourcesTab resources={partyResources} onAdjust={adjustResource} onSet={setResource} />
        )}
        {tab === 'stnotes' && (
          <StNotesTab notes={stNotes} onChange={setStNotes} />
        )}
      </main>

      {resolvingJob && (
        <ResolveModal
          job={resolvingJob}
          faction={factionById(factions, resolvingJob.factionId)}
          factions={factions}
          goals={goals}
          onResolve={resolveJob}
          onCancel={() => setResolvingJob(null)}
        />
      )}

      {resolvingStory && (
        <ResolveStoryModal
          mission={resolvingStory}
          factions={factions}
          onResolve={resolveStoryMission}
          onCancel={() => setResolvingStory(null)}
        />
      )}

      {chainPrompt && (
        <ChainModal
          prompt={chainPrompt}
          factions={factions}
          library={library}
          onAccept={(job) => {
            addJob({ ...job, parentJobId: chainPrompt.parent.id, factionId: chainPrompt.parent.factionId });
            setChainPrompt(null);
          }}
          onSkip={() => setChainPrompt(null)}
        />
      )}

      {factionTurnPrompt && (
        <FactionTurnModal
          prompt={factionTurnPrompt}
          factions={factions}
          onClose={() => setFactionTurnPrompt(null)}
          onAddRumor={(text, factionId) => addRumor(text, 'faction-turn', null, factionId)}
        />
      )}

      {rumorPromptForGoal && (
        <RumorPromptModal
          goal={rumorPromptForGoal.goal}
          faction={factionById(factions, rumorPromptForGoal.goal.factionId)}
          lastChange={rumorPromptForGoal.lastChange}
          onSave={(text) => {
            if (text) addRumor(text, 'goal-event', rumorPromptForGoal.goal.id, rumorPromptForGoal.goal.factionId);
            setRumorPromptForGoal(null);
          }}
          onSkip={() => setRumorPromptForGoal(null)}
        />
      )}

      {rolloverPrompt && (
        <SeasonalRolloverModal
          goals={rolloverPrompt.goals}
          factions={factions}
          allGoals={goals}
          onConfirm={(resolutions, seededGoals) => {
            applySeasonalRollover(resolutions, seededGoals);
            setRolloverPrompt(null);
          }}
          onCancel={() => setRolloverPrompt(null)}
        />
      )}

      {createGoalJobFor && (
        <CreateGoalJobModal
          goal={createGoalJobFor}
          faction={factionById(factions, createGoalJobFor.factionId)}
          onCreate={(jobData) => {
            addJob(jobData);
            setCreateGoalJobFor(null);
          }}
          onCancel={() => setCreateGoalJobFor(null)}
        />
      )}
    </div>
  );
}

// === HEADER ===

function Header({ tab, setTab, activeCount, currentDay, factionTurnReady, pendingRumorsCount, onAdvanceDay, onSetDay, onRunFactionTurn, onRolloverStart }) {
  const tabs = [
    { id: 'active', label: 'Active', badge: activeCount },
    { id: 'story', label: 'Story' },
    { id: 'goals', label: 'Goals' },
    { id: 'generate', label: 'Generate' },
    { id: 'factions', label: 'Factions' },
    { id: 'players', label: 'Players' }
  ];
  const [editingDay, setEditingDay] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [timeMenuOpen, setTimeMenuOpen] = useState(false);
  const breakdown = dayBreakdown(currentDay);

  return (
    <header style={{ borderBottom: '1px solid var(--border)', background: 'var(--bg-card)' }}>
      <div className="max-w-6xl mx-auto px-4 py-4 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h1 style={{ fontFamily: 'var(--font-display)', fontSize: '28px', letterSpacing: '0.05em', color: 'var(--accent)' }}>
            AFTER THE END
          </h1>
          <div style={{ fontSize: '11px', color: 'var(--ink-dim)', letterSpacing: '0.2em' }}>
            JOB & FACTION TRACKER
          </div>
          <div style={{ position: 'relative', display: 'inline-block', marginTop: '6px' }}>
            <button
              onClick={() => setTimeMenuOpen(!timeMenuOpen)}
              style={{
                background: 'transparent',
                border: '1px solid ' + (timeMenuOpen ? 'var(--accent)' : 'var(--border)'),
                color: 'var(--ink)',
                fontSize: '13px',
                padding: '4px 12px',
                cursor: 'pointer',
                letterSpacing: '0.1em',
                fontFamily: 'var(--font-mono)'
              }}
              title="Click to advance time"
            >
              {formatDay(currentDay)} <span style={{ color: 'var(--ink-faint)', marginLeft: '6px', fontSize: '10px' }}>▾</span>
            </button>
            {timeMenuOpen && (
              <>
                <div onClick={() => setTimeMenuOpen(false)} style={{ position: 'fixed', inset: 0, zIndex: 20 }} />
                <div style={{
                  position: 'absolute',
                  top: 'calc(100% + 4px)',
                  left: 0,
                  background: 'var(--bg-card)',
                  border: '1px solid var(--accent)',
                  zIndex: 21,
                  minWidth: '200px',
                  padding: '6px'
                }}>
                  <button
                    onClick={() => { onAdvanceDay(1); setTimeMenuOpen(false); }}
                    style={timeMenuItemStyle()}
                  >+ 1 day</button>
                  <button
                    onClick={() => { onAdvanceDay(5); setTimeMenuOpen(false); }}
                    style={timeMenuItemStyle()}
                  >+ 5 days</button>
                  <button
                    onClick={() => {
                      const next = currentDay + (DAYS_PER_SEASON - breakdown.dayInSeason + 1);
                      onSetDay(next);
                      setTimeMenuOpen(false);
                    }}
                    style={timeMenuItemStyle()}
                  >→ Next Season</button>
                  <div style={{ borderTop: '1px solid var(--border)', margin: '4px 0' }} />
                  <button
                    onClick={() => { onRolloverStart(); setTimeMenuOpen(false); }}
                    style={timeMenuItemStyle('var(--accent)')}
                  >Seasonal Rollover</button>
                  <div style={{ borderTop: '1px solid var(--border)', margin: '4px 0' }} />
                  <button
                    onClick={() => { setEditingDay(true); setTimeMenuOpen(false); }}
                    style={timeMenuItemStyle()}
                  >✎ Set day manually</button>
                </div>
              </>
            )}
          </div>
        </div>
        <nav className="flex gap-1 flex-wrap">
          {tabs.map(t => (
            <button
              key={t.id}
              onClick={() => setTab(t.id)}
              style={{
                background: tab === t.id ? 'var(--accent-dim)' : 'transparent',
                color: tab === t.id ? 'var(--ink)' : 'var(--ink-dim)',
                border: '1px solid ' + (tab === t.id ? 'var(--accent)' : 'var(--border)'),
                padding: '8px 14px',
                fontFamily: 'var(--font-mono)',
                fontSize: '12px',
                letterSpacing: '0.1em',
                textTransform: 'uppercase',
                cursor: 'pointer'
              }}
            >
              {t.label}
              {t.badge !== undefined && t.badge > 0 && (
                <span style={{ marginLeft: '6px', color: 'var(--accent)' }}>[{t.badge}]</span>
              )}
            </button>
          ))}
          <div style={{ position: 'relative' }}>
            <button
              onClick={() => setMenuOpen(!menuOpen)}
              style={{
                background: (tab === 'history' || tab === 'library' || tab === 'resources' || tab === 'stnotes') ? 'var(--accent-dim)' : 'transparent',
                color: (tab === 'history' || tab === 'library' || tab === 'resources' || tab === 'stnotes') ? 'var(--ink)' : 'var(--ink-dim)',
                border: '1px solid ' + ((tab === 'history' || tab === 'library' || tab === 'resources' || tab === 'stnotes' || menuOpen) ? 'var(--accent)' : 'var(--border)'),
                padding: '8px 14px',
                fontFamily: 'var(--font-mono)',
                fontSize: '12px',
                letterSpacing: '0.1em',
                cursor: 'pointer'
              }}
              title="More"
            >⋯</button>
            {menuOpen && (
              <>
                <div onClick={() => setMenuOpen(false)} style={{ position: 'fixed', inset: 0, zIndex: 20 }} />
                <div style={{
                  position: 'absolute',
                  top: 'calc(100% + 4px)',
                  right: 0,
                  background: 'var(--bg-card)',
                  border: '1px solid var(--accent)',
                  zIndex: 21,
                  minWidth: '180px'
                }}>
                  {[
                    { id: 'resources', label: 'Party Resources' },
                    { id: 'stnotes', label: 'ST Notes' },
                    { id: 'library', label: 'Library' },
                    { id: 'history', label: 'History' }
                  ].map((item, i, arr) => (
                    <button
                      key={item.id}
                      onClick={() => { setTab(item.id); setMenuOpen(false); }}
                      style={{
                        display: 'block',
                        width: '100%',
                        textAlign: 'left',
                        background: tab === item.id ? 'var(--accent-dim)' : 'transparent',
                        color: tab === item.id ? 'var(--ink)' : 'var(--ink-dim)',
                        border: 'none',
                        padding: '10px 14px',
                        fontFamily: 'var(--font-mono)',
                        fontSize: '12px',
                        letterSpacing: '0.1em',
                        textTransform: 'uppercase',
                        cursor: 'pointer',
                        borderBottom: i < arr.length - 1 ? '1px solid var(--border)' : 'none'
                      }}
                    >{item.label}</button>
                  ))}
                </div>
              </>
            )}
          </div>
        </nav>
      </div>

      {editingDay && (
        <DayEditPopover
          breakdown={breakdown}
          onSave={(year, seasonIndex, dayInSeason) => {
            const abs = composeAbsDay(year, seasonIndex, dayInSeason);
            onSetDay(abs);
            setEditingDay(false);
          }}
          onCancel={() => setEditingDay(false)}
        />
      )}

      {/* Faction turn ready banner */}
      {factionTurnReady && (
        <div style={{ background: 'var(--accent-dim)', borderTop: '1px solid var(--accent)', padding: '8px 16px' }} className="max-w-6xl mx-auto flex items-center justify-between gap-3 flex-wrap">
          <div style={{ fontSize: '12px', color: 'var(--ink)', letterSpacing: '0.05em' }}>
            <span style={{ color: 'var(--accent)', fontWeight: 700 }}>FACTION TURN READY</span> — 7+ days have passed since the last roll.
          </div>
          <button
            onClick={onRunFactionTurn}
            style={{ background: 'var(--accent)', color: 'var(--bg)', border: 'none', padding: '4px 12px', fontSize: '11px', letterSpacing: '0.1em', textTransform: 'uppercase', fontFamily: 'var(--font-mono)', fontWeight: 700, cursor: 'pointer' }}
          >Run Faction Turn</button>
        </div>
      )}
    </header>
  );
}

function DayEditPopover({ breakdown, onSave, onCancel }) {
  const [year, setYear] = useState(breakdown.year);
  const [seasonIndex, setSeasonIndex] = useState(breakdown.seasonIndex);
  const [dayInSeason, setDayInSeason] = useState(breakdown.dayInSeason);

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', zIndex: 50 }} className="flex items-center justify-center p-4">
      <div style={{ background: 'var(--bg-card)', border: '1px solid var(--accent)', maxWidth: '420px', width: '100%', padding: '20px' }}>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: '18px', color: 'var(--accent)', marginBottom: '12px' }}>
          Set Current Day
        </div>
        <div className="grid grid-cols-3 gap-3">
          <Field label="Day in season">
            <input className="w-full" type="number" min="1" max={DAYS_PER_SEASON} value={dayInSeason} onChange={e => setDayInSeason(e.target.value)} />
          </Field>
          <Field label="Season">
            <select className="w-full" value={seasonIndex} onChange={e => setSeasonIndex(parseInt(e.target.value))}>
              {SEASONS.map((s, i) => <option key={s} value={i}>{s}</option>)}
            </select>
          </Field>
          <Field label="Year">
            <input className="w-full" type="number" min="1" value={year} onChange={e => setYear(e.target.value)} />
          </Field>
        </div>
        <div style={{ fontSize: '10px', color: 'var(--ink-faint)', marginTop: '8px', fontStyle: 'italic' }}>
          1 season = {DAYS_PER_SEASON} days. Setting backward is allowed.
        </div>
        <div className="flex justify-end gap-2 mt-4">
          <SmallBtn variant="dim" onClick={onCancel}>Cancel</SmallBtn>
          <SmallBtn variant="accent" onClick={() => onSave(year, seasonIndex, dayInSeason)}>Set</SmallBtn>
        </div>
      </div>
    </div>
  );
}

// === ACTIVE JOBS TAB ===

function ActiveJobsTab({ jobs, factions, goals, pendingRumors, onUpdate, onDelete, onResolveStart, onGoToGoals }) {
  const [query, setQuery] = useState('');
  const [showOffered, setShowOffered] = useState(false);

  const rumorsPanel = pendingRumors && pendingRumors.length > 0 && (
    <div style={{ background: 'var(--bg-card)', border: '1px solid var(--accent)', padding: '8px 12px' }} className="flex items-center justify-between gap-2 flex-wrap">
      <div style={{ fontSize: '11px', color: 'var(--ink-dim)', letterSpacing: '0.05em' }}>
        <span style={{ color: 'var(--accent)', fontWeight: 700 }}>{pendingRumors.length} pending rumor{pendingRumors.length !== 1 ? 's' : ''}</span> waiting to drop into the table.
      </div>
      <SmallBtn variant="dim" onClick={onGoToGoals}>View on Goals →</SmallBtn>
    </div>
  );

  if (jobs.length === 0) {
    return (
      <div className="py-6 space-y-6">
        {rumorsPanel}
        <div className="py-12 text-center">
          <div style={{ fontFamily: 'var(--font-display)', fontSize: '20px', color: 'var(--ink-dim)', marginBottom: '8px' }}>
            No active jobs
          </div>
          <div style={{ fontSize: '13px', color: 'var(--ink-faint)' }}>
            Head over to <span style={{ color: 'var(--accent)' }}>GENERATE</span> to spin one up.
          </div>
        </div>
      </div>
    );
  }

  const matches = (j) => {
    if (!query.trim()) return true;
    const q = query.toLowerCase();
    const faction = factionById(factions, j.factionId);
    const hay = [j.title, j.missionType, j.sourceLabel, j.sourceType, j.complication, j.notes, faction?.name].filter(Boolean).join(' ').toLowerCase();
    return hay.includes(q);
  };

  const filtered = jobs.filter(matches);
  const offered = filtered.filter(j => j.status === 'offered');
  const taken = filtered.filter(j => j.status === 'active');

  // If user is searching, show offered automatically
  const showOfferedSection = showOffered || (query.trim() && offered.length > 0);

  return (
    <div className="py-6 space-y-4">
      {rumorsPanel}

      <SearchBar query={query} setQuery={setQuery} placeholder="Search active jobs..." />

      {filtered.length === 0 && query && (
        <div className="py-12 text-center" style={{ color: 'var(--ink-faint)' }}>
          No matches for "{query}"
        </div>
      )}

      {taken.length > 0 && (
        <section>
          <SectionHeader>In Play ({taken.length})</SectionHeader>
          <div className="space-y-2 mt-3">
            {taken.map(job => (
              <JobCard key={job.id} job={job} factions={factions} goals={goals} onUpdate={onUpdate} onDelete={onDelete} onResolveStart={onResolveStart} />
            ))}
          </div>
        </section>
      )}

      {offered.length > 0 && (
        <section>
          <button
            onClick={() => setShowOffered(!showOffered)}
            disabled={query.trim() && offered.length > 0}
            style={{
              background: 'transparent',
              border: 'none',
              padding: '4px 0',
              cursor: query.trim() ? 'default' : 'pointer',
              fontFamily: 'var(--font-display)',
              fontSize: '13px',
              color: 'var(--ink-dim)',
              letterSpacing: '0.15em',
              textTransform: 'uppercase',
              display: 'flex',
              alignItems: 'center',
              gap: '8px'
            }}
          >
            <span>Offered ({offered.length})</span>
            <span style={{ fontSize: '10px', color: 'var(--ink-faint)' }}>{showOfferedSection ? '▾' : '▸'}</span>
          </button>
          {showOfferedSection && (
            <div className="space-y-2 mt-3">
              {offered.map(job => (
                <JobCard key={job.id} job={job} factions={factions} goals={goals} onUpdate={onUpdate} onDelete={onDelete} onResolveStart={onResolveStart} />
              ))}
            </div>
          )}
        </section>
      )}
    </div>
  );
}

function SearchBar({ query, setQuery, placeholder }) {
  return (
    <div style={{ position: 'relative' }}>
      <input
        className="w-full"
        value={query}
        onChange={e => setQuery(e.target.value)}
        placeholder={placeholder}
        style={{ padding: '8px 32px 8px 12px' }}
      />
      {query && (
        <button
          onClick={() => setQuery('')}
          style={{ position: 'absolute', right: '8px', top: '50%', transform: 'translateY(-50%)', background: 'transparent', border: 'none', color: 'var(--ink-dim)', cursor: 'pointer', fontSize: '14px' }}
        >×</button>
      )}
    </div>
  );
}

function SectionHeader({ children }) {
  return (
    <div style={{
      fontFamily: 'var(--font-display)',
      fontSize: '16px',
      color: 'var(--accent)',
      letterSpacing: '0.1em',
      borderBottom: '1px solid var(--border)',
      paddingBottom: '6px'
    }}>
      {children}
    </div>
  );
}

function JobCard({ job, factions, goals, onUpdate, onDelete, onResolveStart }) {
  const [expanded, setExpanded] = useState(false);
  const faction = factionById(factions, job.factionId);
  const daysOut = job.status === 'active' && (job.daysRemaining ?? 0) <= 0;

  return (
    <div style={{ background: 'var(--bg-card)', border: '1px solid ' + (daysOut ? 'var(--danger)' : 'var(--border)'), padding: '10px 14px' }}>
      <div className="flex items-center gap-3">
        <div className="flex-1 min-w-0">
          <div className="flex items-baseline gap-2 flex-wrap">
            <span style={{ color: 'var(--accent)', letterSpacing: '0.1em', fontSize: '12px' }}>{stars(job.tier)}</span>
            <span style={{ fontFamily: 'var(--font-display)', fontSize: '15px', color: 'var(--ink)' }}>
              {job.title || job.missionType || 'Untitled'}
            </span>
            {job.goalJobLink && (
              <span style={{ fontSize: '9px', padding: '1px 6px', background: 'transparent', border: '1px solid var(--accent)', color: 'var(--accent)', letterSpacing: '0.1em' }}>GOAL</span>
            )}
          </div>
          <div style={{ fontSize: '11px', color: 'var(--ink-dim)', marginTop: '2px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
            {faction ? faction.name : '—'}
            {job.sourceType && <span> · {job.sourceType}{job.sourceLabel ? ': ' + job.sourceLabel : ''}</span>}
            {job.status === 'active' && (
              <span style={{ color: daysOut ? 'var(--danger)' : 'var(--ink-faint)' }}>
                {' · '}{daysOut ? 'OVERDUE' : `${job.daysRemaining ?? 0}d left`}
              </span>
            )}
          </div>
        </div>
        <div className="flex gap-2 flex-shrink-0">
          {job.status === 'offered' && (
            <>
              <SmallBtn onClick={() => onUpdate(job.id, { status: 'active' })}>Take</SmallBtn>
              <SmallBtn onClick={() => onDelete(job.id)} variant="dim">Decline</SmallBtn>
            </>
          )}
          {job.status === 'active' && (
            <SmallBtn onClick={() => onResolveStart(job)} variant="accent">Resolve</SmallBtn>
          )}
          <SmallBtn onClick={() => setExpanded(!expanded)} variant="dim">{expanded ? '−' : '+'}</SmallBtn>
        </div>
      </div>

      {expanded && (
        <div className="mt-4 space-y-3" style={{ borderTop: '1px solid var(--border)', paddingTop: '12px' }}>
          <Field label="Title">
            <input className="w-full" value={job.title || ''} onChange={e => onUpdate(job.id, { title: e.target.value })} placeholder="Short label / hook..." />
          </Field>
          <Field label="Structure">
            <textarea className="w-full" rows={2} value={job.structure || ''} onChange={e => onUpdate(job.id, { structure: e.target.value })} />
          </Field>
          <Field label="Complication">
            <textarea className="w-full" rows={2} value={job.complication || ''} onChange={e => onUpdate(job.id, { complication: e.target.value })} />
          </Field>
          <div className="grid grid-cols-1 gap-3">
            <Field label="Days remaining">
              <div className="flex items-center gap-2">
                <SmallBtn onClick={() => onUpdate(job.id, { daysRemaining: Math.max(0, (job.daysRemaining || 0) - 1) })} variant="dim">−</SmallBtn>
                <input
                  className="flex-1 text-center"
                  type="number"
                  value={job.daysRemaining ?? ''}
                  onChange={e => onUpdate(job.id, { daysRemaining: parseInt(e.target.value) || 0 })}
                />
                <SmallBtn onClick={() => onUpdate(job.id, { daysRemaining: (job.daysRemaining || 0) + 1 })} variant="dim">+</SmallBtn>
              </div>
            </Field>
          </div>
          <LootEditor
            loot={job.loot || []}
            tier={job.tier}
            onChange={(next) => onUpdate(job.id, { loot: next })}
          />
          <Field label="ST notes (private)">
            <textarea className="w-full" rows={3} value={job.notes || ''} onChange={e => onUpdate(job.id, { notes: e.target.value })} placeholder="What's really going on, hidden hooks, who knows what..." />
          </Field>
          <SideEffectsEditor
            sideEffects={job.sideEffects || {}}
            factions={factions}
            primaryFactionId={job.factionId}
            onChange={(next) => onUpdate(job.id, { sideEffects: next })}
          />
          <GoalEffectsEditor
            goalEffects={job.goalEffects || {}}
            goals={goals}
            factions={factions}
            jobTier={job.tier}
            onChange={(next) => onUpdate(job.id, { goalEffects: next })}
          />
          {job.goalJobLink && job.goalJobLink.impactByOutcome && (
            <div style={{ background: 'var(--bg-card-2)', border: '1px solid var(--accent)', padding: '10px 12px' }}>
              <div style={{ fontSize: '10px', color: 'var(--accent)', letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: '6px' }}>
                Outcome Preview — {job.goalJobLink.goalTitle}
              </div>
              <div className="space-y-1">
                {[
                  { id: 'clean', label: 'Clean', color: 'var(--good)' },
                  { id: 'messy', label: 'Messy', color: 'var(--accent)' },
                  { id: 'failed', label: 'Failed', color: 'var(--danger)' },
                  { id: 'abandoned', label: 'Abandoned', color: 'var(--danger)' }
                ].map(o => {
                  const rep = repChangeFor(job.tier, o.id);
                  const gi = job.goalJobLink.impactByOutcome[o.id];
                  return (
                    <div key={o.id} className="flex items-center gap-3" style={{ fontSize: '11px' }}>
                      <div style={{ flex: '0 0 80px', color: o.color, fontWeight: 700, letterSpacing: '0.05em' }}>
                        {o.label.toUpperCase()}
                      </div>
                      <div className="flex-1 flex gap-4">
                        <div>
                          <span style={{ color: 'var(--ink-faint)' }}>rep: </span>
                          <span style={{ color: rep > 0 ? 'var(--good)' : rep < 0 ? 'var(--danger)' : 'var(--ink-dim)', fontWeight: 700 }}>
                            {rep > 0 ? '+' : ''}{rep}
                          </span>
                        </div>
                        <div>
                          <span style={{ color: 'var(--ink-faint)' }}>goal: </span>
                          <span style={{ color: gi > 0 ? 'var(--good)' : 'var(--danger)', fontWeight: 700 }}>
                            {gi > 0 ? '+' : ''}{gi}
                          </span>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          {faction && !job.goalJobLink && (
            <div style={{ fontSize: '11px', color: 'var(--ink-faint)', padding: '6px 0' }}>
              On clean: <span style={{ color: 'var(--good)' }}>+{repChangeFor(job.tier, 'clean')}</span> rep ·
              {' '}On messy: <span style={{ color: 'var(--good)' }}>+{repChangeFor(job.tier, 'messy')}</span> ·
              {' '}On fail: <span style={{ color: 'var(--danger)' }}>{repChangeFor(job.tier, 'failed')}</span> ·
              {' '}On abandon: <span style={{ color: 'var(--danger)' }}>{repChangeFor(job.tier, 'abandoned')}</span>
              {' '}with <span style={{ color: 'var(--accent)' }}>{faction.name}</span>
            </div>
          )}
          <div className="flex justify-end pt-2">
            <SmallBtn onClick={() => onDelete(job.id)} variant="danger">Delete</SmallBtn>
          </div>
        </div>
      )}
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', marginBottom: '4px', textTransform: 'uppercase' }}>{label}</div>
      {children}
    </div>
  );
}

function SideEffectsEditor({ sideEffects, factions, primaryFactionId, onChange }) {
  const [pickFid, setPickFid] = useState('');
  const [pickVal, setPickVal] = useState(0);

  const entries = Object.entries(sideEffects).filter(([fid, v]) => v !== '' && v !== null && v !== undefined);

  const usedIds = new Set([primaryFactionId, ...entries.map(([fid]) => fid)]);
  const available = factions.filter(f => !usedIds.has(f.id));

  const tryCommit = (fid, val) => {
    if (!fid || val === '' || val === '-' || val === 0) return false;
    const n = parseInt(val);
    if (isNaN(n) || n === 0) return false;
    onChange({ ...sideEffects, [fid]: n });
    setPickFid('');
    setPickVal(0);
    return true;
  };

  const updateEffect = (fid, val) => {
    const n = parseInt(val);
    const next = { ...sideEffects };
    if (val === '' || isNaN(n)) {
      delete next[fid];
    } else {
      next[fid] = n;
    }
    onChange(next);
  };

  const removeEffect = (fid) => {
    const next = { ...sideEffects };
    delete next[fid];
    onChange(next);
  };

  return (
    <div style={{ background: 'var(--bg-card-2)', border: '1px solid var(--border)', padding: '10px 12px' }}>
      <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: '8px' }}>
        Side Faction Effects
      </div>

      {entries.length === 0 && available.length === 0 && (
        <div style={{ fontSize: '11px', color: 'var(--ink-faint)', fontStyle: 'italic' }}>
          No other factions available.
        </div>
      )}

      {entries.length > 0 && (
        <div className="space-y-2 mb-2">
          {entries.map(([fid, val]) => {
            const f = factionById(factions, fid);
            if (!f) return null;
            const n = parseInt(val);
            return (
              <div key={fid} className="flex items-center gap-2">
                <div className="flex-1 min-w-0" style={{ fontSize: '12px', color: 'var(--ink)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                  {f.name}
                </div>
                <input
                  type="number"
                  value={val}
                  onChange={e => updateEffect(fid, e.target.value)}
                  style={{ width: '70px', textAlign: 'center', color: n > 0 ? 'var(--good)' : n < 0 ? 'var(--danger)' : 'var(--ink)' }}
                />
                <SmallBtn variant="dim" onClick={() => removeEffect(fid)}>×</SmallBtn>
              </div>
            );
          })}
        </div>
      )}

      {available.length > 0 && (
        <div className="flex flex-wrap items-center gap-2" style={entries.length > 0 ? { paddingTop: '8px', borderTop: '1px dashed var(--border)' } : {}}>
          <select
            value={pickFid}
            onChange={e => {
              const fid = e.target.value;
              setPickFid(fid);
              if (fid) tryCommit(fid, pickVal);
            }}
            style={{ flex: '1 1 140px' }}
          >
            <option value="">+ Add faction...</option>
            {available.map(f => (
              <option key={f.id} value={f.id}>{f.name}</option>
            ))}
          </select>
          <input
            type="number"
            placeholder="±0"
            value={pickVal}
            onChange={e => {
              const val = e.target.value;
              setPickVal(val);
              if (pickFid) tryCommit(pickFid, val);
            }}
            onBlur={() => tryCommit(pickFid, pickVal)}
            style={{ width: '70px', textAlign: 'center' }}
          />
        </div>
      )}

      {entries.length > 0 && (
        <div style={{ fontSize: '10px', color: 'var(--ink-faint)', marginTop: '6px', fontStyle: 'italic' }}>
          Static — same regardless of outcome. Adjust at resolve time if reality differed.
        </div>
      )}
      {entries.length === 0 && available.length > 0 && (
        <div style={{ fontSize: '10px', color: 'var(--ink-faint)', marginTop: '6px', fontStyle: 'italic' }}>
          Pick a faction and type a number — it'll add automatically.
        </div>
      )}
    </div>
  );
}

// LootEditor — manages an array of loot strings on a job.
// `tier` is used to power the "Suggest" button.
// `readOnly` shows items as a list with no controls (used in resolve modal).
function LootEditor({ loot, tier, onChange, readOnly }) {
  const [draft, setDraft] = useState('');
  const items = Array.isArray(loot) ? loot : [];

  const addItem = (text) => {
    const t = (text || '').trim();
    if (!t) return;
    onChange([...items, t]);
  };

  const updateItem = (idx, text) => {
    const next = [...items];
    next[idx] = text;
    onChange(next);
  };

  const removeItem = (idx) => {
    onChange(items.filter((_, i) => i !== idx));
  };

  const suggest = () => {
    const picks = rollLootSuggestions(tier || 1, 3);
    onChange([...items, ...picks]);
  };

  const submitDraft = () => {
    if (draft.trim()) {
      addItem(draft);
      setDraft('');
    }
  };

  if (readOnly) {
    return (
      <div style={{ background: 'var(--bg-card-2)', border: '1px solid var(--border)', padding: '10px 12px' }}>
        <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: '8px' }}>
          Loot
        </div>
        {items.length === 0 ? (
          <div style={{ fontSize: '11px', color: 'var(--ink-faint)', fontStyle: 'italic' }}>
            No loot recorded.
          </div>
        ) : (
          <ul style={{ margin: 0, paddingLeft: '18px', fontSize: '12px', color: 'var(--ink)', lineHeight: 1.6 }}>
            {items.map((it, i) => <li key={i}>{it}</li>)}
          </ul>
        )}
      </div>
    );
  }

  return (
    <div style={{ background: 'var(--bg-card-2)', border: '1px solid var(--border)', padding: '10px 12px' }}>
      <div className="flex items-center justify-between gap-2 mb-2 flex-wrap">
        <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', textTransform: 'uppercase' }}>
          Loot {items.length > 0 && <span style={{ color: 'var(--ink-faint)' }}>({items.length})</span>}
        </div>
        <SmallBtn variant="dim" onClick={suggest}>+ Suggest 3</SmallBtn>
      </div>

      {items.length > 0 && (
        <div className="space-y-1 mb-2">
          {items.map((it, i) => (
            <div key={i} className="flex items-center gap-2">
              <input
                value={it}
                onChange={e => updateItem(i, e.target.value)}
                style={{ flex: 1, fontSize: '12px' }}
              />
              <SmallBtn variant="dim" onClick={() => removeItem(i)}>×</SmallBtn>
            </div>
          ))}
        </div>
      )}

      <div className="flex items-center gap-2" style={items.length > 0 ? { paddingTop: '6px', borderTop: '1px dashed var(--border)' } : {}}>
        <input
          value={draft}
          onChange={e => setDraft(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); submitDraft(); } }}
          onBlur={submitDraft}
          placeholder="+ Add loot item (press Enter)"
          style={{ flex: 1, fontSize: '12px' }}
        />
      </div>
    </div>
  );
}

function GoalEffectsEditor({ goalEffects, goals, factions, jobTier, onChange }) {
  const [pickGid, setPickGid] = useState('');
  const [pickVal, setPickVal] = useState(0);

  const entries = Object.entries(goalEffects).filter(([gid, v]) => v !== '' && v !== null && v !== undefined);

  const activeGoals = (goals || []).filter(g => g.status !== 'resolved' && g.term === 'seasonal');
  const usedIds = new Set(entries.map(([gid]) => gid));
  const available = activeGoals.filter(g => !usedIds.has(g.id));

  const tryCommit = (gid, val) => {
    if (!gid || val === '' || val === '-' || val === 0) return false;
    const n = parseInt(val);
    if (isNaN(n) || n === 0) return false;
    onChange({ ...goalEffects, [gid]: n });
    setPickGid('');
    setPickVal(0);
    return true;
  };

  const updateEffect = (gid, val) => {
    const n = parseInt(val);
    const next = { ...goalEffects };
    if (val === '' || isNaN(n)) {
      delete next[gid];
    } else {
      next[gid] = n;
    }
    onChange(next);
  };

  const removeEffect = (gid) => {
    const next = { ...goalEffects };
    delete next[gid];
    onChange(next);
  };

  // Show entries even with value 0 (so "Offer as Job" links are visible before user types impact)
  const allEntries = Object.entries(goalEffects);

  return (
    <div style={{ background: 'var(--bg-card-2)', border: '1px solid var(--border)', padding: '10px 12px' }}>
      <div className="flex items-center justify-between mb-2">
        <div style={{ fontSize: '10px', color: 'var(--ink-dim)', letterSpacing: '0.15em', textTransform: 'uppercase' }}>
          Faction Goal Effects
        </div>
        {jobTier && (
          <span style={{ fontSize: '10px', color: 'var(--ink-faint)' }}>
            Suggested: {GOAL_IMPACT_HINTS[jobTier] || '—'}
          </span>
        )}
      </div>

      {allEntries.length === 0 && activeGoals.length === 0 && (
        <div style={{ fontSize: '11px', color: 'var(--ink-faint)', fontStyle: 'italic' }}>
          No active seasonal goals to affect.
        </div>
      )}

      {allEntries.length > 0 && (
        <div className="space-y-2 mb-2">
          {allEntries.map(([gid, val]) => {
            const g = activeGoals.find(x => x.id === gid) || (goals || []).find(x => x.id === gid);
            if (!g) return null;
            const f = factionById(factions, g.factionId);
            const n = parseInt(val);
            return (
              <div key={gid} className="flex items-center gap-2">
                <div className="flex-1 min-w-0" style={{ fontSize: '12px', color: 'var(--ink)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                  <span style={{ color: 'var(--accent)' }}>{f?.name || '?'}:</span> {g.title}
                  <span style={{ color: 'var(--ink-faint)', marginLeft: '6px' }}>({g.progress}/100)</span>
                </div>
                <input
                  type="number"
                  value={val}
                  onChange={e => updateEffect(gid, e.target.value)}
                  style={{ width: '70px', textAlign: 'center', color: n > 0 ? 'var(--good)' : n < 0 ? 'var(--danger)' : 'var(--ink)' }}
                />
                <SmallBtn variant="dim" onClick={() => removeEffect(gid)}>×</SmallBtn>
              </div>
            );
          })}
        </div>
      )}

      {available.length > 0 && (
        <div className="flex flex-wrap items-center gap-2" style={allEntries.length > 0 ? { paddingTop: '8px', borderTop: '1px dashed var(--border)' } : {}}>
          <select
            value={pickGid}
            onChange={e => {
              const gid = e.target.value;
              setPickGid(gid);
              if (gid) tryCommit(gid, pickVal);
            }}
            style={{ flex: '1 1 200px', minWidth: 0, maxWidth: '100%' }}
          >
            <option value="">+ Add goal effect...</option>
            {available.map(g => {
              const f = factionById(factions, g.factionId);
              return (
                <option key={g.id} value={g.id}>
                  {f?.name || '?'}: {g.title} ({g.progress}/100)
                </option>
              );
            })}
          </select>
          <input
            type="number"
            placeholder="±0"
            value={pickVal}
            onChange={e => {
              const val = e.target.value;
              setPickVal(val);
              if (pickGid) tryCommit(pickGid, val);
            }}
            onBlur={() => tryCommit(pickGid, pickVal)}
            style={{ width: '70px', textAlign: 'center' }}
          />
        </div>
      )}

      {allEntries.length === 0 && available.length > 0 && (
        <div style={{ fontSize: '10px', color: 'var(--ink-faint)', marginTop: '6px', fontStyle: 'italic' }}>
          Optional. Pick a goal and type the impact — it'll commit automatically.
        </div>
      )}
    </div>
  );
}

function SmallBtn({ children, onClick, variant }) {
  const styles = {
    default: { background: 'var(--border)', color: 'var(--ink)', border: '1px solid var(--border-strong)' },
    dim: { background: 'transparent', color: 'var(--ink-dim)', border: '1px solid var(--border)' },
    accent: { background: 'var(--accent-dim)', color: 'var(--ink)', border: '1px solid var(--accent)' },
    danger: { background: 'transparent', color: 'var(--danger)', border: '1px solid var(--danger)' }
  };
  const style = styles[variant] || styles.default;
  return (
    <button
      onClick={onClick}
      style={{
        ...style,
        padding: '4px 10px',
        fontFamily: 'var(--font-mono)',
        fontSize: '11px',
        letterSpacing: '0.1em',
        textTransform: 'uppercase',
        cursor: 'pointer'
      }}
    >
      {children}
    </button>
  );
}

// === GENERATE TAB ===

function GenerateTab({ factions, library, goals, onCreate }) {
  const [sourceType, setSourceType] = useState('Job Board');
  const [sourceLabel, setSourceLabel] = useState('');
  const [factionId, setFactionId] = useState('');
  const [tier, setTier] = useState(1);
  const [missionType, setMissionType] = useState('');
  const [draft, setDraft] = useState(null);

  const faction = factionById(factions, factionId);
  const factionRep = faction?.rep ?? 0;

  const tierMissions = library[tier] || [];

  const generate = () => {
    if (tierMissions.length === 0) return;
    const lib = tierMissions.find(m => m.type === missionType) || tierMissions[Math.floor(Math.random() * tierMissions.length)];
    const complications = lib.complications || [];
    const complication = complications.length > 0
      ? complications[Math.floor(Math.random() * complications.length)]
      : '';
    setDraft({
      title: '',
      sourceType,
      sourceLabel,
      factionId: factionId || null,
      tier,
      missionType: lib.type,
      structure: lib.structure,
      complication,
      loot: [],
      daysRemaining: lib.timeDefault,
      notes: ''
    });
  };

  const rerollComplication = () => {
    if (!draft) return;
    const lib = tierMissions.find(m => m.type === draft.missionType);
    if (!lib || !lib.complications || lib.complications.length === 0) return;
    const filtered = lib.complications.filter(c => c !== draft.complication);
    const next = filtered[Math.floor(Math.random() * filtered.length)] || lib.complications[0];
    setDraft({ ...draft, complication: next });
  };

  const save = (status) => {
    onCreate({ ...draft, status });
    setDraft(null);
  };

  return (
    <div className="py-6 space-y-6">
      <SectionHeader>Generate Job</SectionHeader>

      <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', padding: '16px' }} className="space-y-4">
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <Field label="Source type">
            <select className="w-full" value={sourceType} onChange={e => setSourceType(e.target.value)}>
              {SOURCE_TYPES.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </Field>
          <Field label="Source label (NPC name, board location, etc.)">
            <input className="w-full" value={sourceLabel} onChange={e => setSourceLabel(e.target.value)} placeholder="Wes the trapper / Stacks board / etc." />
          </Field>
          <Field label="Faction (giving rep)">
            <select className="w-full" value={factionId} onChange={e => setFactionId(e.target.value)}>
              <option value="">— None / unaffiliated —</option>
              {sortFactions(factions).map(f => <option key={f.id} value={f.id}>{f.name} ({f.rep})</option>)}
            </select>
          </Field>
          <Field label="Tier">
            <div className="flex gap-1">
              {[1,2,3,4,5].map(t => {
                const locked = factionId && !tierUnlocked(factionRep, t);
                return (
                  <button
                    key={t}
                    onClick={() => { setTier(t); setMissionType(''); }}
                    style={{
                      flex: 1,
                      padding: '6px 0',
                      background: tier === t ? 'var(--accent-dim)' : 'transparent',
                      border: '1px solid ' + (tier === t ? 'var(--accent)' : 'var(--border)'),
                      color: locked ? 'var(--ink-faint)' : tier === t ? 'var(--ink)' : 'var(--ink-dim)',
                      fontFamily: 'var(--font-mono)',
                      fontSize: '12px',
                      letterSpacing: '0.05em',
                      cursor: 'pointer',
                      position: 'relative'
                    }}
                    title={locked ? `Locked — needs ${REP_RULES.thresholds[t]} rep with this faction` : ''}
                  >
                    {stars(t)}
                    {locked && <span style={{ position: 'absolute', top: '2px', right: '4px', fontSize: '8px' }}>🔒</span>}
                  </button>
                );
              })}
            </div>
          </Field>
        </div>

        <Field label="Mission type (optional — leave blank for random)">
          <select className="w-full" value={missionType} onChange={e => setMissionType(e.target.value)}>
            <option value="">— Random within tier {stars(tier)} —</option>
            {tierMissions.map(m => <option key={m.type} value={m.type}>{m.type}</option>)}
          </select>
        </Field>

        <div className="flex justify-end pt-2">
          <SmallBtn onClick={generate} variant="accent">Generate</SmallBtn>
        </div>
      </div>

      {draft && (
        <div style={{ background: 'var(--bg-card)', border: '1px solid var(--accent)', padding: '16px' }} className="space-y-3">
          <div style={{ fontFamily: 'var(--font-display)', fontSize: '18px', color: 'var(--accent)' }}>
            {stars(draft.tier)} {draft.missionType}
          </div>
          <Field label="Title (short hook — what players see/hear)">
            <input className="w-full" value={draft.title} onChange={e => setDraft({ ...draft, title: e.target.value })} placeholder="e.g. Hauler down past mile 4" />
          </Field>
          <Field label="Structure (the bones)">
            <textarea className="w-full" rows={2} value={draft.structure} onChange={e => setDraft({ ...draft, structure: e.target.value })} />
          </Field>
          <Field label={
            <span>
              Complication
              {' '}<button onClick={rerollComplication} style={{ background: 'transparent', border: 'none', color: 'var(--accent)', fontSize: '10px', letterSpacing: '0.1em', cursor: 'pointer' }}>↻ REROLL</button>
            </span>
          }>
            <textarea className="w-full" rows={2} value={draft.complication} onChange={e => setDraft({ ...draft, complication: e.target.value })} />
          </Field>
          <div className="grid grid-cols-1 gap-3">
            <Field label="Days">
              <input className="w-full" type="number" value={draft.daysRemaining} onChange={e => setDraft({ ...draft, daysRemaining: parseInt(e.target.value) || 0 })} />
            </Field>
          </div>
          <LootEditor
            loot={draft.loot || []}
            tier={draft.tier}
            onChange={(next) => setDraft({ ...draft, loot: next })}
          />
          <Field label="ST notes (private)">
            <textarea className="w-full" rows={3} value={draft.notes} onChange={e => setDraft({ ...draft, notes: e.target.value })} placeholder="What's really going on, hidden threads..." />
          </Field>

          <SideEffectsEditor
            sideEffects={draft.sideEffects || {}}
            factions={factions}
            primaryFactionId={draft.factionId}
            onChange={(next) => setDraft({ ...draft, sideEffects: next })}
          />

          <GoalEffectsEditor
            goalEffects={draft.goalEffects || {}}
            goals={goals}
            factions={factions}
            jobTier={draft.tier}
            onChange={(next) => setDraft({ ...draft, goalEffects: next })}
          />

          <div className="flex flex-wrap gap-2 justify-end pt-2">
            <SmallBtn onClick={() => setDraft(null)} variant="dim">Discard</SmallBtn>
            <SmallBtn onClick={() => save('offered')}>Save as Offered</SmallBtn>
            <SmallBtn onClick={() => save('active')} variant="accent">Save as Taken</SmallBtn>
          </div>
        </div>
      )}
    </div>
  );
}
